const PFX='ag9_';

// Leitura síncrona do cache local
const dbGet=(k,fb)=>{try{const v=localStorage.getItem(PFX+k);return v?JSON.parse(v):fb}catch{return fb}};

// Escrita: salva localmente E envia para o Supabase (fire-and-forget)
const dbSet=(k,v)=>{
  try{localStorage.setItem(PFX+k,JSON.stringify(v));localStorage.setItem(PFX+k+'_bak',JSON.stringify(v));}catch{}
  supabaseClient.from(DB_TABLE).upsert({key:k,value:v},{onConflict:'key'})
    .then(({error})=>{if(error)console.warn('Supabase write ['+k+']:', error.message)});
};

// Leitura assíncrona do Supabase (usada na inicialização do app)
const dbLoad=async(k,fb)=>{
  try{
    const{data,error}=await supabaseClient.from(DB_TABLE).select('value').eq('key',k).maybeSingle();
    if(!error&&data?.value){localStorage.setItem(PFX+k,JSON.stringify(data.value));return data.value;}
  }catch(e){console.warn('Supabase read ['+k+']:', e.message);}
  return dbGet(k,fb);
};

// Reset: apaga do localStorage e do Supabase
const dbReset=()=>{
  const KEYS=['pastos','animais','fin','movs','sal','manejos','cfg'];
  KEYS.forEach(k=>{localStorage.removeItem(PFX+k);localStorage.removeItem(PFX+k+'_bak');});
  supabaseClient.from(DB_TABLE).delete().in('key',KEYS)
    .then(({error})=>{if(error)console.warn('Supabase reset:', error.message)});
};

function calcIdade(dn){
  if(!dn)return null;
  const ms=new Date()-new Date(dn+'T12:00');
  if(ms<0)return{label:'Não nasceu',dias:0,cor:'#6B7280'};
  const dias=Math.floor(ms/86400000),meses=Math.floor(dias/30.44),anos=Math.floor(dias/365.25);
  let label,cor;
  if(dias<1){label='Recém-nascido';cor='#F48FB1';}
  else if(dias<7){label=`${dias} dia${dias>1?'s':''}`;cor='#F48FB1';}
  else if(dias<30){label=`${dias} dias`;cor='#F4A261';}
  else if(meses<12){const d=dias%30;label=`${meses}m${d?` ${d}d`:''}`;cor='#E9C46A';}
  else{const m=meses%12;label=`${anos}a${m?` ${m}m`:''}`;cor='#52B788';}
  return{label,dias,meses,anos,cor};
}
function calcSal(pid,n,regs,tx=225){
  const items=[...regs.filter(s=>s.pastoId===pid)].sort((a,b)=>a.data.localeCompare(b.data));
  const cd=(n*tx)/1000;
  if(!items.length)return{kg:0,dias:0,cd,alerta:true};
  let kg=0,ant=null;
  for(const it of items){if(ant){const d=(new Date(it.data+'T12:00')-new Date(ant+'T12:00'))/86400000;kg=Math.max(0,kg-cd*d);}kg+=it.sacos*30;ant=it.data;}
  if(ant){const d=(Date.now()-new Date(ant+'T12:00'))/86400000;kg=Math.max(0,kg-cd*d);}
  return{kg,dias:cd>0?kg/cd:999,cd,alerta:kg<(cd*7)};
}

// ═══ MAPA SATÉLITE ════════════════════════════════════════════════
function MapaMedicao({onAplicar,onFechar}){
  const divRef=useRef(null),mapR=useRef(null),ptsR=useRef([]),mksR=useRef([]),polyR=useRef(null);
  const [area,setArea]=useState(0),[nPts,setNPts]=useState(0);
  const calcAreaHa=pts=>{if(pts.length<3)return 0;const R=6371000,n=pts.length;let a=0;for(let i=0;i<n;i++){const j=(i+1)%n;a+=(pts[j].lng-pts[i].lng)*Math.PI/180*(2+Math.sin(pts[i].lat*Math.PI/180)+Math.sin(pts[j].lat*Math.PI/180));}return Math.abs(a*R*R/2)/10000;};
  useEffect(()=>{
    const t=setTimeout(()=>{
      if(!divRef.current||mapR.current)return;
      const map=L.map(divRef.current,{center:[-21.9569,-44.8881],zoom:16});
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19}).addTo(map);
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,opacity:0.75}).addTo(map);
      const mkIcon=n=>L.divIcon({html:`<div style="background:#F4A261;color:#FFF;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:3px solid #FFF;box-shadow:0 2px 8px rgba(0,0,0,0.7);font-family:sans-serif">${n}</div>`,className:'',iconSize:[28,28],iconAnchor:[14,14]});
      map.on('click',e=>{const pt={lat:e.latlng.lat,lng:e.latlng.lng};ptsR.current=[...ptsR.current,pt];const n=ptsR.current.length;const mk=L.marker([pt.lat,pt.lng],{icon:mkIcon(n)}).addTo(map);mksR.current.push(mk);upd(map);});
      mapR.current=map;map.invalidateSize();
    },150);
    return()=>{clearTimeout(t);if(mapR.current){mapR.current.remove();mapR.current=null;}};
  },[]);
  const upd=map=>{const pts=ptsR.current;if(polyR.current)map.removeLayer(polyR.current);if(pts.length>=3)polyR.current=L.polygon(pts.map(p=>[p.lat,p.lng]),{color:'#52B788',fillColor:'#52B788',fillOpacity:0.2,weight:2}).addTo(map);else if(pts.length>=2)polyR.current=L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#52B788',weight:2,dashArray:'6,4'}).addTo(map);setArea(calcAreaHa(pts));setNPts(pts.length);};
  const desfazer=()=>{const map=mapR.current;if(!map||!mksR.current.length)return;map.removeLayer(mksR.current.pop());ptsR.current=ptsR.current.slice(0,-1);upd(map);};
  const limpar=()=>{const map=mapR.current;if(!map)return;mksR.current.forEach(m=>map.removeLayer(m));mksR.current=[];if(polyR.current){map.removeLayer(polyR.current);polyR.current=null;}ptsR.current=[];setArea(0);setNPts(0);};
  return <div style={{position:'fixed',inset:0,zIndex:2000,display:'flex',flexDirection:'column'}}>
    <div style={{background:'#1B4332',color:'#FFF',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}><div><div style={{fontWeight:800,fontSize:16}}>🛰️ Medição por Satélite</div><div style={{fontSize:12,opacity:0.7}}>Toque no mapa para marcar vértices</div></div><button onClick={onFechar} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#FFF',borderRadius:8,padding:'6px 14px',fontWeight:700,cursor:'pointer'}}>✕</button></div>
    <div ref={divRef} style={{flex:1}}/>
    <div style={{background:'#FFF',padding:14,flexShrink:0}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}><div style={{background:'#D8F3DC',borderRadius:12,padding:'10px 14px',textAlign:'center'}}><div style={{fontSize:10,color:'#6B7280',fontWeight:700,textTransform:'uppercase'}}>Área</div><div style={{fontSize:26,fontWeight:800,color:'#1B4332',lineHeight:1.2}}>{area.toFixed(2)}<span style={{fontSize:13}}> ha</span></div></div><div style={{background:'#F0F4F1',borderRadius:12,padding:'10px 14px',textAlign:'center'}}><div style={{fontSize:10,color:'#6B7280',fontWeight:700,textTransform:'uppercase'}}>Pontos</div><div style={{fontSize:26,fontWeight:800,lineHeight:1.2}}>{nPts}</div><div style={{fontSize:10,color:'#6B7280'}}>{nPts<3?'mín. 3':'✓'}</div></div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}><button onClick={desfazer} style={{background:'#F0F4F1',border:'1.5px solid #E5E7EB',borderRadius:10,padding:'11px 0',fontSize:13,fontWeight:600,cursor:'pointer',color:'#6B7280'}}>↩️ Desfazer</button><button onClick={limpar} style={{background:'#FFF3E0',border:'1.5px solid #F4A261',borderRadius:10,padding:'11px 0',fontSize:13,fontWeight:600,cursor:'pointer',color:'#F4A261'}}>🗑️ Limpar</button></div>
      <button onClick={()=>onAplicar(area)} disabled={nPts<3} style={{background:nPts<3?'#CCC':'#2D6A4F',color:'#FFF',border:'none',borderRadius:12,padding:'13px',fontSize:15,fontWeight:700,width:'100%',cursor:nPts<3?'not-allowed':'pointer'}}>✅ Aplicar {area>0?`— ${area.toFixed(2)} ha`:''}</button>
    </div>
  </div>;
}

// ═══ CLIMA ════════════════════════════════════════════════════════
const WMO={0:'☀️',1:'🌤️',2:'⛅',3:'🌥️',51:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'⛈️',80:'🌦️',82:'⛈️',95:'⛈️'};
function ClimaWidget(){
  const T=useT(),[d,setD]=useState(null),[load,setLoad]=useState(true),[err,setErr]=useState(false);
  useEffect(()=>{fetch('https://api.open-meteo.com/v1/forecast?latitude=-21.9569&longitude=-44.8881&daily=precipitation_sum,temperature_2m_max,weathercode&current_weather=true&timezone=America%2FSao_Paulo&forecast_days=7').then(r=>{if(!r.ok)throw 0;return r.json()}).then(v=>{setD(v);setLoad(false)}).catch(()=>{setErr(true);setLoad(false)});},[]);
  const base={background:`linear-gradient(135deg,${T.blue},${T.bLight})`,color:'#FFF'};
  if(load)return<Card ch={<div style={{textAlign:'center',padding:12,fontSize:13}}>⏳ Carregando clima...</div>} style={base}/>;
  if(err)return<Card ch={<div style={{fontSize:12}}>⚠️ Clima offline</div>} style={{background:T.gray,color:'#FFF'}}/>;
  const cw=d.current_weather,dl=d.daily,ct=dl.precipitation_sum.reduce((s,v)=>s+(v||0),0);
  return <Card ch={<>
    <div style={{fontWeight:800,fontSize:13,marginBottom:10,opacity:0.9}}>🌦️ Baependi — MG</div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><div><div style={{fontSize:44,fontWeight:800,lineHeight:1}}>{Math.round(cw.temperature)}°C</div><div style={{fontSize:12,opacity:0.8,marginTop:3}}>💨 {Math.round(cw.windspeed)} km/h</div></div><div style={{textAlign:'right'}}><div style={{fontSize:40}}>{WMO[cw.weathercode]||'🌡️'}</div><div style={{fontSize:11,opacity:0.75}}>Chuva 7 dias</div><div style={{fontWeight:700,fontSize:17}}>{ct.toFixed(0)} mm</div></div></div>
    <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:2}}>{dl.time.map((t,i)=><div key={t} style={{flex:'0 0 50px',background:'rgba(255,255,255,0.2)',borderRadius:10,padding:'6px 3px',textAlign:'center'}}><div style={{fontSize:10,opacity:0.85}}>{i===0?'Hoje':['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(t+'T12:00').getDay()]}</div><div style={{fontSize:16,margin:'2px 0'}}>{WMO[dl.weathercode[i]]||'🌡️'}</div><div style={{fontSize:11,fontWeight:700}}>{Math.round(dl.temperature_2m_max[i])}°</div><div style={{fontSize:10,opacity:0.8}}>{(dl.precipitation_sum[i]||0)>0?`${(dl.precipitation_sum[i]).toFixed(0)}mm`:'—'}</div></div>)}</div>
  </>} style={base}/>;
}

// ═══ QUICK MODALS ═════════════════════════════════════════════════
function GlobalModals({action,onClose,pastos,animais,setAnimais,setSal,setMovs}){
  const T=useT();
  const oc=pastos.filter(p=>p.status==='ocupado'),ativos=animais.filter(a=>a.status==='ativo'),vacas=ativos.filter(a=>a.cat==='Vaca'||a.cat==='Novilha');
  const nomePasto=id=>pastos.find(p=>p.id===id)?.nome||'Sem pasto';
  const [fS,setFS]=useState({pastoId:String(oc[0]?.id||''),sacos:'',data:TODAY,obs:''});
  const [fN,setFN]=useState({ident:'',sexo:'M',dataNasc:TODAY,raca:'',peso:'',maeId:'',pastoId:String(oc[0]?.id||''),lote:'B',obs:''});
  const [pBusca,setPBusca]=useState(''),[pAnimal,setPAnimal]=useState(''),[pDest,setPDest]=useState(''),[pObs,setPObs]=useState('');
  const filtr=pBusca?ativos.filter(a=>a.ident.toLowerCase().includes(pBusca.toLowerCase())):ativos;
  const saveSal=()=>{if(!fS.pastoId||!fS.sacos)return;setSal(s=>[...s,{...fS,id:Date.now(),pastoId:+fS.pastoId,sacos:+fS.sacos}]);onClose();};
  const saveNasc=()=>{if(!fN.ident.trim())return;setAnimais(a=>[...a,{...fN,id:Date.now(),cat:'Bezerro',status:'ativo',pastoId:fN.pastoId?+fN.pastoId:null,peso:+fN.peso||0,maeId:fN.maeId?+fN.maeId:null}]);onClose();};
  const savePasto=()=>{if(!pAnimal||!pDest)return;const a=animais.find(x=>x.id===+pAnimal);setMovs(m=>[{id:Date.now(),ident:a.ident,de:nomePasto(a.pastoId),para:nomePasto(+pDest),data:TODAY,obs:pObs},...m]);setAnimais(a2=>a2.map(x=>x.id===+pAnimal?{...x,pastoId:+pDest}:x));onClose();};

  if(action==='sal')return<Modal open title="🧂 Registrar Sal Mineral" onClose={onClose}>
    <Sel label="Pasto" value={fS.pastoId} onChange={v=>setFS(f=>({...f,pastoId:v}))} opts={[{v:'',l:'Selecionar...'},...oc.map(p=>({v:String(p.id),l:p.nome}))]}/>
    <Inp label="Sacos (30 kg/saco)" value={fS.sacos} onChange={v=>setFS(f=>({...f,sacos:v}))} type="number" placeholder="3"/>
    <Inp label="Data" value={fS.data} onChange={v=>setFS(f=>({...f,data:v}))} type="date"/>
    <Inp label="Observações" value={fS.obs} onChange={v=>setFS(f=>({...f,obs:v}))} placeholder="Opcional..."/>
    <Btn l="💾 Salvar" onClick={saveSal} dis={!fS.pastoId||!fS.sacos}/>
  </Modal>;

  if(action==='nascimento')return<Modal open title="🐮 Registrar Nascimento" onClose={onClose}>
    <div style={{background:T.pinkPale,borderRadius:12,padding:12,marginBottom:12}}>
      <label style={{display:'block',fontSize:11,fontWeight:700,color:T.pinkDark,marginBottom:8,textTransform:'uppercase'}}>Sexo</label>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{[['M','♂ Macho',T.blueMid,T.bluePale],['F','♀ Fêmea',T.pinkDark,T.pinkPale]].map(([v,l,c,bg])=><button key={v} onClick={()=>setFN(f=>({...f,sexo:v}))} style={{border:`2.5px solid ${fN.sexo===v?c:T.border}`,borderRadius:12,padding:'11px 0',fontWeight:700,fontSize:14,cursor:'pointer',background:fN.sexo===v?bg:T.card,color:fN.sexo===v?c:T.gray}}>{l}</button>)}</div>
    </div>
    <Inp label="Identificador *" value={fN.ident} onChange={v=>setFN(f=>({...f,ident:v}))} placeholder="Ex: BEZ-009"/>
    <Inp label="📅 Nascimento" value={fN.dataNasc} onChange={v=>setFN(f=>({...f,dataNasc:v}))} type="date"/>
    {(()=>{const id=calcIdade(fN.dataNasc);return id&&fN.dataNasc?<div style={{fontSize:12,color:id.cor,fontWeight:600,marginBottom:12}}>⏱ {id.label}</div>:null;})()}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Inp label="Raça" value={fN.raca} onChange={v=>setFN(f=>({...f,raca:v}))} placeholder="Nelore"/><Inp label="Peso (kg)" value={fN.peso} onChange={v=>setFN(f=>({...f,peso:v}))} type="number" placeholder="35"/></div>
    <Sel label="🐄 Mãe" value={fN.maeId} onChange={v=>setFN(f=>({...f,maeId:v}))} opts={[{v:'',l:'Selecionar mãe...'},...vacas.map(v=>({v:String(v.id),l:`${v.ident}${v.raca?' · '+v.raca:''}`}))]}/>
    <Sel label="Pasto" value={fN.pastoId} onChange={v=>setFN(f=>({...f,pastoId:v}))} opts={[{v:'',l:'Sem pasto'},...pastos.map(p=>({v:String(p.id),l:p.nome}))]}/>
    <Btn l="💾 Registrar Nascimento" onClick={saveNasc} dis={!fN.ident.trim()}/>
  </Modal>;

  if(action==='pasto')return<Modal open title="🌿 Mover Animal de Pasto" onClose={onClose}>
    {!pAnimal?<>
      <Inp label="Buscar pelo brinco" value={pBusca} onChange={setPBusca} placeholder="Número do brinco..."/>
      <div style={{maxHeight:300,overflowY:'auto'}}>{filtr.slice(0,25).map(a=>{const pt=pastos.find(p=>p.id===a.pastoId);return<div key={a.id} onClick={()=>setPAnimal(String(a.id))} style={{background:T.bg,borderRadius:12,padding:'11px 13px',marginBottom:7,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:700,color:T.text}}>{a.ident}</div><div style={{fontSize:12,color:T.gray}}>{a.cat} · {pt?.nome||'Sem pasto'}</div></div><span style={{color:T.green,fontWeight:700,fontSize:18}}>›</span></div>;})}
      {filtr.length===0&&<div style={{textAlign:'center',padding:20,color:T.gray}}>Nenhum encontrado</div>}</div>
    </>:<>
      <div style={{background:T.gPale,borderRadius:12,padding:12,marginBottom:12}}><div style={{fontWeight:800,color:T.text}}>{animais.find(a=>a.id===+pAnimal)?.ident}</div><div style={{fontSize:12,color:T.gray}}>📍 {nomePasto(animais.find(a=>a.id===+pAnimal)?.pastoId)}</div><button onClick={()=>setPAnimal('')} style={{background:'none',border:'none',color:T.green,fontSize:12,cursor:'pointer',marginTop:4,padding:0,fontWeight:600}}>← Trocar animal</button></div>
      <Sel label="Destino" value={pDest} onChange={setPDest} opts={[{v:'',l:'Selecionar pasto...'},...pastos.filter(p=>String(p.id)!==String(animais.find(a=>a.id===+pAnimal)?.pastoId)).map(p=>({v:String(p.id),l:`${p.nome} · ${PS[p.status]?.l}`}))]}/>
      <Inp label="Observação" value={pObs} onChange={setPObs} placeholder="Motivo..."/>
      <Btn l="✅ Confirmar Movimentação" onClick={savePasto} dis={!pDest}/>
    </>}
  </Modal>;
  return null;
}

// ═══ DASHBOARD ════════════════════════════════════════════════════
function Dashboard({pastos,animais,fin,sal,onAction}){
  const T=useT(),hoje=new Date();
  const mes=`${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  const ativos=animais.filter(a=>a.status==='ativo');
  const bezAtivos=ativos.filter(a=>a.cat==='Bezerro');
  const bezNovos=bezAtivos.filter(a=>a.dataNasc&&calcIdade(a.dataNasc)?.dias<30);
  const ultimoSal=[...sal].sort((a,b)=>b.data.localeCompare(a.data))[0];
  const diasSemSal=ultimoSal?Math.floor((Date.now()-new Date(ultimoSal.data+'T12:00'))/86400000):null;
  const alertas=[];
  if(diasSemSal===null||diasSemSal>20)alertas.push({icon:'🧂',msg:diasSemSal===null?'Sal nunca registrado':`${diasSemSal} dias sem registrar sal`});
  pastos.filter(p=>p.status==='ocupado'&&(p.estado==='ruim'||p.estado==='muito_ruim')).forEach(p=>alertas.push({icon:'🌿',msg:`${p.nome} em estado ${PE[p.estado]?.l} — precisa descanso`}));
  pastos.filter(p=>p.status==='ocupado'&&p.cap>0&&ativos.filter(a=>a.pastoId===p.id).length/p.cap>0.9).forEach(p=>alertas.push({icon:'🐄',msg:`${p.nome} acima de 90% de lotação`}));
  const tM=fin.filter(t=>t.data.startsWith(mes));
  const rec=tM.filter(t=>t.tipo==='receita').reduce((s,t)=>s+t.valor,0),desp=tM.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+t.valor,0),saldo=rec-desp;
  return <div>
    <div style={{background:`linear-gradient(135deg,${T.gDark},${T.green})`,padding:'20px 20px 36px',position:'relative'}}>
      <button onClick={()=>onAction('settings')} style={{position:'absolute',top:14,right:14,background:'rgba(255,255,255,0.15)',border:'none',color:'rgba(255,255,255,0.85)',borderRadius:8,width:34,height:34,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>
      <div style={{color:'rgba(255,255,255,0.6)',fontSize:11,textTransform:'uppercase',letterSpacing:'0.8px'}}>Fazendinha</div>
      <div style={{color:'#FFF',fontSize:23,fontWeight:800,marginTop:4}}>Bom dia! 👋</div>
      <div style={{color:'rgba(255,255,255,0.75)',fontSize:12,marginTop:2}}>{hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <div style={{padding:'0 14px 100px',marginTop:-20,position:'relative',zIndex:1}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
        {[{icon:'🧂',label:'Registrar Sal',sub:'Repor mineral',c:T.orange,bg:'#FFF3E0',a:'sal'},{icon:'🐮',label:'Nascimento',sub:'Novo bezerro',c:T.pinkDark,bg:T.pinkPale,a:'nascimento'},{icon:'🌿',label:'Mover Animal',sub:'Trocar pasto',c:T.green,bg:T.gPale,a:'pasto'}].map(({icon,label,sub,c,bg,a})=><button key={a} onClick={()=>onAction(a)} style={{background:bg,border:`2px solid ${c}28`,borderRadius:16,padding:'14px 6px 12px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:5,minHeight:96}}><span style={{fontSize:30,lineHeight:1}}>{icon}</span><span style={{fontSize:12,fontWeight:800,color:c,textAlign:'center',lineHeight:1.2}}>{label}</span><span style={{fontSize:10,color:c+'99',textAlign:'center'}}>{sub}</span></button>)}
      </div>
      {alertas.length>0&&<div style={{background:T.card,borderRadius:14,padding:14,marginBottom:12,border:`1.5px solid ${T.orange}30`,boxShadow:`0 2px 8px ${T.shadow}`}}><div style={{fontWeight:800,color:T.orange,fontSize:13,marginBottom:8}}>⚠️ Alertas da fazenda</div>{alertas.map((a,i)=><div key={i} style={{fontSize:13,color:T.text,padding:'5px 0',borderBottom:i<alertas.length-1?`1px solid ${T.border}`:'none'}}>{a.icon} {a.msg}</div>)}</div>}
      {bezNovos.length>0&&<Card ch={<><div style={{fontWeight:800,color:T.pinkDark,marginBottom:7}}>🐮 Nascimentos recentes</div>{bezNovos.map(b=>{const id=calcIdade(b.dataNasc);return<div key={b.id} style={{fontSize:13,marginBottom:3}}>• <b>{b.ident}</b> — {id?.label} · {b.sexo==='M'?'♂':'♀'}</div>;})}</>} style={{border:`2px solid ${T.pink}`,background:T.pinkPale}}/>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <Card ch={<><div style={{fontSize:28,marginBottom:5}}>🐄</div><div style={{fontSize:34,fontWeight:800,color:T.green,lineHeight:1}}>{ativos.filter(a=>a.cat!=='Bezerro').length}</div><div style={{fontSize:11,color:T.gray,marginTop:2}}>Animais ativos</div></>} style={{margin:0,background:T.gPale}}/>
        <Card ch={<><div style={{fontSize:28,marginBottom:5}}>🐮</div><div style={{fontSize:34,fontWeight:800,color:T.pinkDark,lineHeight:1}}>{bezAtivos.length}</div><div style={{fontSize:11,color:T.gray,marginTop:2}}>Bezerros</div></>} style={{margin:0,background:T.pinkPale}}/>
      </div>
      <Card ch={<><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span style={{fontWeight:800,fontSize:13,color:T.text}}>💰 {hoje.toLocaleDateString('pt-BR',{month:'long'})}</span><Badge l={saldo>=0?'▲ Positivo':'▼ Negativo'} c={saldo>=0?T.gLight:T.red} bg={saldo>=0?T.gPale:'#FFE4E6'}/></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>{[['Entradas',fmtR(rec),T.gLight],['Saídas',fmtR(desp),T.red],['Saldo',fmtR(saldo),saldo>=0?T.green:T.red]].map(([l,v,c])=><div key={l} style={{textAlign:'center',background:T.bg,borderRadius:10,padding:'8px 4px'}}><div style={{fontSize:10,color:T.gray,fontWeight:700,textTransform:'uppercase'}}>{l}</div><div style={{fontWeight:700,color:c,fontSize:11}}>{v}</div></div>)}</div></>}/>
      <ClimaWidget/>
    </div>
  </div>;
}

// ═══ PASTO DETAIL PAGE ════════════════════════════════════════════

  const T=useT();

  const manejosDoPasto=manejos.filter(m=>m.animaisIds?.some(id=>animaisNoPasto.map(a=>a.id).includes(id)));
  const movsDoPasto=movs.filter(m=>m.de===pasto.nome||m.para===pasto.nome);
  const {kg,dias,cd}=calcSal(pasto.id,animaisNoPasto.length,sal,pasto.taxaSal||225);
  const salCor=dias<3?T.red:dias<7?T.orange:T.gLight;
  const st=PS[pasto.status]||{},es=PE[pasto.estado]||{};
  const deletePasto=()=>{setPastos(p=>p.filter(x=>x.id!==pasto.id));onBack();};

      <Card ch={<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
          {[['Estoque',`${kg.toFixed(1)} kg`],['Duração',dias>90?'>90d':`${Math.round(dias)}d`],['Consumo',`${cd.toFixed(1)}kg/d`]].map(([l,v])=><div key={l} style={{background:T.bg,borderRadius:10,padding:'8px 6px',textAlign:'center'}}><div style={{fontSize:10,color:T.gray,fontWeight:700}}>{l}</div><div style={{fontSize:13,fontWeight:800,color:salCor}}>{v}</div></div>)}
        </div>
        <div style={{background:T.bg,borderRadius:8,height:8,overflow:'hidden'}}><div style={{background:salCor,height:'100%',width:`${Math.min(100,Math.max(0,(dias/30)*100))}%`,borderRadius:8}}/></div>

      {salDoPasto.map(s=><Card key={s.id} ch={<><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:700,color:T.text}}>{s.sacos} sacos ({s.sacos*30} kg)</div><div style={{fontSize:12,color:T.gray}}>📅 {fmtD(s.data)}{s.obs?` · ${s.obs}`:''}</div></div><button onClick={()=>deleteSal(s.id)} style={{background:'#FFE4E6',border:'none',borderRadius:8,padding:'6px 12px',color:T.red,fontWeight:700,fontSize:12,cursor:'pointer'}}>🗑️</button></div></>} style={{marginBottom:8}}/>)}

        <Btn l="💾 Salvar Reposição" onClick={addSal} dis={!formS.pastoId||!formS.sacos}/>

    <Modal open={addM} onClose={()=>setAddM(false)} title="Novo Pasto">

// ═══ FINANCEIRO ═══════════════════════════════════════════════════
function Financeiro({fin,setFin}){
  const T=useT(),[aba,setAba]=useState('tudo'),[modal,setM]=useState(false),[detail,setDetail]=useState(null);
  const eF={tipo:'despesa',valor:'',cat:'Alimentação',desc:'',data:TODAY};
  const [form,setForm]=useState(eF);
  const hoje=new Date(),mes=`${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  const tM=fin.filter(t=>t.data.startsWith(mes));
  const rec=tM.filter(t=>t.tipo==='receita').reduce((s,t)=>s+t.valor,0),desp=tM.filter(t=>t.tipo==='despesa').reduce((s,t)=>s+t.valor,0),saldo=rec-desp;
  const catR=['Venda de gado','Leite','Arrendamento','Outros'],catD=['Alimentação','Manutenção','Animal','Pasto','Combustível','Mão de obra','Outros'];
  const add=()=>{if(!form.valor)return;setFin(f=>[{...form,id:Date.now(),valor:+form.valor},...f]);setM(false);setForm(eF);};
  const del=id=>{setFin(f=>f.filter(x=>x.id!==id));setDetail(null);};
  const lista=(aba==='tudo'?tM:tM.filter(t=>t.tipo===(aba==='rec'?'receita':'despesa'))).sort((a,b)=>b.data.localeCompare(a.data));
  if(detail){
    const isR=detail.tipo==='receita',cor=isR?T.green:T.red;
    return <DetailPage onBack={()=>setDetail(null)} title={isR?'Receita':'Despesa'} icon={isR?'▲':'▼'} color={`linear-gradient(135deg,${isR?T.gDark:'#7B1D1D'},${isR?T.green:T.red})`}>
      <Section title="Detalhes da Transação">
        <Card ch={<><div style={{textAlign:'center',padding:'16px 0',marginBottom:12}}><div style={{fontSize:40,fontWeight:800,color:cor}}>{isR?'+':'-'}{fmtR(detail.valor)}</div><div style={{fontSize:13,color:T.gray,marginTop:4}}>{fmtD(detail.data)}</div></div><InfoRow label="Categoria" value={detail.cat}/><InfoRow label="Tipo" value={isR?'Receita':'Despesa'} color={cor}/><InfoRow label="Descrição" value={detail.desc||'—'}/><InfoRow label="Data" value={fmtD(detail.data)}/></>}/>
      </Section>
      <DeleteBtn label="esta transação" onConfirm={()=>del(detail.id)}/>
      <div style={{height:20}}/>
    </DetailPage>;
  }
  return <div style={{paddingBottom:100}}>
    <PgH sub="Controle" title="Financeiro 💰"/>
    <div style={{padding:'12px 14px 0'}}>
      <div style={{background:saldo>=0?`linear-gradient(135deg,${T.gDark},${T.green})`:`linear-gradient(135deg,#7B1D1D,${T.red})`,borderRadius:16,padding:18,marginBottom:12,color:'#FFF'}}>
        <div style={{fontSize:11,opacity:0.75,textTransform:'uppercase',letterSpacing:'0.5px'}}>Saldo do mês</div>
        <div style={{fontSize:34,fontWeight:800}}>{fmtR(saldo)}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:12}}><div><div style={{fontSize:11,opacity:0.7}}>▲ Entradas</div><div style={{fontWeight:700,fontSize:15}}>{fmtR(rec)}</div></div><div><div style={{fontSize:11,opacity:0.7}}>▼ Saídas</div><div style={{fontWeight:700,fontSize:15}}>{fmtR(desp)}</div></div></div>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:11}}>{[['tudo','Tudo'],['rec','Entradas'],['desp','Saídas']].map(([id,lbl])=><button key={id} onClick={()=>setAba(id)} style={{flex:1,border:'none',borderRadius:10,padding:'10px 0',fontWeight:600,fontSize:13,cursor:'pointer',background:aba===id?T.green:T.gPale,color:aba===id?'#FFF':T.green}}>{lbl}</button>)}</div>
      {lista.length===0&&<div style={{textAlign:'center',padding:22,color:T.gray}}>Nenhum lançamento</div>}
      {lista.map(t=><div key={t.id} onClick={()=>setDetail(t)} style={{background:T.card,borderRadius:12,padding:'11px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,boxShadow:`0 1px 4px ${T.shadow}`,cursor:'pointer'}}>
        <div style={{display:'flex',gap:9,alignItems:'center'}}><div style={{width:34,height:34,borderRadius:9,background:t.tipo==='receita'?T.gPale:'#FFE4E6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{t.tipo==='receita'?'▲':'▼'}</div><div><div style={{fontWeight:600,fontSize:13,color:T.text}}>{t.cat}</div><div style={{fontSize:11,color:T.gray}}>{t.desc&&t.desc+' · '}{fmtD(t.data)}</div></div></div>
        <div style={{fontWeight:700,color:t.tipo==='receita'?T.gLight:T.red,fontSize:14,flexShrink:0}}>{t.tipo==='receita'?'+':'-'}{fmtR(t.valor)}</div>
      </div>)}
      <Btn l="+ Lançar Transação" onClick={()=>setM(true)}/>
    </div>
    <Modal open={modal} onClose={()=>setM(false)} title="Nova Transação">
      <div style={{display:'flex',gap:7,marginBottom:13}}>{[['receita','▲ Entrada'],['despesa','▼ Saída']].map(([tp,lbl])=><button key={tp} onClick={()=>setForm(f=>({...f,tipo:tp,cat:tp==='receita'?catR[0]:catD[0]}))} style={{flex:1,border:'none',borderRadius:11,padding:13,fontWeight:700,fontSize:14,cursor:'pointer',background:form.tipo===tp?(tp==='receita'?T.green:T.red):T.bg,color:form.tipo===tp?'#FFF':T.gray}}>{lbl}</button>)}</div>
      <Inp label="Valor (R$) *" value={form.valor} onChange={v=>setForm(f=>({...f,valor:v}))} type="number" placeholder="0,00"/>
      <Sel label="Categoria" value={form.cat} onChange={v=>setForm(f=>({...f,cat:v}))} opts={(form.tipo==='receita'?catR:catD).map(v=>({v,l:v}))}/>
      <Inp label="Descrição" value={form.desc} onChange={v=>setForm(f=>({...f,desc:v}))} placeholder="Opcional..."/>
      <Inp label="Data" value={form.data} onChange={v=>setForm(f=>({...f,data:v}))} type="date"/>
      <Btn l="💾 Salvar" onClick={add} dis={!form.valor}/>
    </Modal>
  </div>;
}

// ═══ CURRAL ═══════════════════════════════════════════════════════
function CurralTool({animais,pastos,onSalvar,onFechar}){
  const T=useT(),[cfg,setCfg]=useState(true),[tipo,setTipo]=useState('ivermectina'),[nomeC,setNomeC]=useState(''),[dose,setDose]=useState(''),[data,setData]=useState(TODAY),[obs,setObs]=useState('');
  const [pF,setPF]=useState('todos'),[checked,setChecked]=useState({}),[busca,setBusca]=useState(''),[salvo,setSalvo]=useState(false);
  const ativos=animais.filter(a=>a.status==='ativo'),porPasto=pF==='todos'?ativos:ativos.filter(a=>String(a.pastoId)===pF);
  const filtrados=busca?porPasto.filter(a=>a.ident.toLowerCase().includes(busca.toLowerCase())):porPasto;
  const nC=filtrados.filter(a=>checked[a.id]).length,ti=TM.find(t=>t.v===tipo)||TM[0];

  const checkAll=()=>{const n={...checked};filtrados.forEach(a=>n[a.id]=true);setChecked(n);};
  const uncheckAll=()=>{const n={...checked};filtrados.forEach(a=>delete n[a.id]);setChecked(n);};

    </div>

      <button onClick={()=>setCfg(o=>!o)} style={{width:'100%',background:'none',border:'none',padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',fontWeight:700,color:T.text,fontSize:13}}>⚙️ Configuração<span style={{fontSize:11,color:T.gray}}>{cfg?'▲':'▼'}</span></button>
      {cfg&&<div style={{padding:'0 14px 12px'}}>
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:9,scrollbarWidth:'none',marginBottom:10}}>{TM.map(t=><button key={t.v} onClick={()=>setTipo(t.v)} style={{border:`2px solid ${tipo===t.v?t.c:T.border}`,borderRadius:20,padding:'7px 13px',fontSize:12,fontWeight:700,cursor:'pointer',background:tipo===t.v?t.c+'18':T.card,color:tipo===t.v?t.c:T.gray,whiteSpace:'nowrap',flexShrink:0}}>{t.icon} {t.l}</button>)}</div>

      </div>}
    </div>
    <div style={{background:T.card,borderBottom:`1px solid ${T.border}`,padding:'7px 13px',flexShrink:0}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar brinco..." style={{width:'100%',border:`1.5px solid ${T.border}`,borderRadius:9,padding:'9px 13px',fontSize:13,outline:'none',background:T.bg,color:T.text,marginBottom:7}}/>

      </div>;})}

    <div style={{background:T.card,padding:'11px 14px',borderTop:`1px solid ${T.border}`,flexShrink:0}}>

      {manejo.animaisIdents?.filter(id=>!animaisManejo.find(a=>a.ident===id)).map((id,i)=><Card key={i} ch={<div><div style={{fontWeight:700,color:T.gray}}>{id}</div><div style={{fontSize:11,color:T.gray}}>Animal não encontrado</div></div>} style={{marginBottom:7}}/>)}

// ═══ HISTÓRICO ════════════════════════════════════════════════════
function HistoricoManejo({movs,setMovs,manejos,setManejos,animais,fin,setFin,pastos}){
  const T=useT(),[filtro,setFiltro]=useState('todos'),[curral,setCurral]=useState(false);
  const [detailManejo,setDetailManejo]=useState(null),[detailMov,setDetailMov]=useState(null),[detailFin,setDetailFin]=useState(null);
  const timeline=useMemo(()=>{const e=[];movs.forEach(m=>e.push({...m,_tipo:'mov'}));manejos.forEach(m=>e.push({...m,_tipo:'manejo'}));animais.filter(a=>a.cat==='Bezerro'&&a.dataNasc).forEach(b=>e.push({id:`n${b.id}`,_tipo:'nascimento',data:b.dataNasc,ident:b.ident,sexo:b.sexo,maeId:b.maeId,raca:b.raca,peso:b.peso}));fin.forEach(f=>e.push({...f,_tipo:'fin'}));return e.sort((a,b)=>(b.data||'').localeCompare(a.data||''));},[movs,manejos,animais,fin]);
  const lista=filtro==='todos'?timeline:timeline.filter(e=>e._tipo===filtro);
  const FILTROS=[{v:'todos',l:'📋 Todos',c:T.green},{v:'manejo',l:'💉 Manejos',c:T.purple},{v:'mov',l:'🔄 Pastos',c:T.orange},{v:'nascimento',l:'🐮 Nascimentos',c:T.pinkDark},{v:'fin',l:'💰 Finanças',c:T.blue}];
  const mes=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
  if(detailManejo)return<ManejoDetailPage manejo={detailManejo} onBack={()=>setDetailManejo(null)} animais={animais} setManejos={setManejos}/>;
  if(detailMov)return<MovDetailPage mov={detailMov} onBack={()=>setDetailMov(null)} setMovs={setMovs}/>;
  if(detailFin){
    const isR=detailFin.tipo==='receita',cor=isR?T.green:T.red;
    const del=()=>{setFin(f=>f.filter(x=>x.id!==detailFin.id));setDetailFin(null);};
    return<DetailPage onBack={()=>setDetailFin(null)} title={isR?'Receita':'Despesa'} icon={isR?'▲':'▼'} color={`linear-gradient(135deg,${isR?T.gDark:'#7B1D1D'},${isR?T.green:T.red})`}>
      <Section title="Detalhes"><Card ch={<><div style={{textAlign:'center',padding:'16px 0',marginBottom:12}}><div style={{fontSize:38,fontWeight:800,color:cor}}>{isR?'+':'-'}{fmtR(detailFin.valor)}</div><div style={{fontSize:13,color:T.gray,marginTop:4}}>{fmtD(detailFin.data)}</div></div><InfoRow label="Categoria" value={detailFin.cat}/><InfoRow label="Descrição" value={detailFin.desc||'—'}/><InfoRow label="Tipo" value={isR?'Receita':'Despesa'} color={cor}/></>}/></Section>
      <DeleteBtn label="esta transação" onConfirm={del}/>
      <div style={{height:20}}/>
    </DetailPage>;
  }
  const renderCard=item=>{
    const df=fmtD(item.data);const cs={background:T.card,borderRadius:13,padding:'11px 14px',marginBottom:9,boxShadow:`0 1px 5px ${T.shadow}`,cursor:'pointer'};
    if(item._tipo==='mov')return<div key={item.id} onClick={()=>setDetailMov(item)} className="su" style={{...cs,borderLeft:`4px solid ${T.orange}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}><div style={{display:'flex',gap:7,alignItems:'center'}}><span style={{fontSize:18}}>🔄</span><div><div style={{fontWeight:700,color:T.text,fontSize:14}}>{item.ident}</div><div style={{fontSize:11,color:T.gray}}>Troca de pasto</div></div></div><span style={{fontSize:11,color:T.gray,background:T.bg,borderRadius:7,padding:'2px 7px',whiteSpace:'nowrap'}}>{df}</span></div><div style={{display:'flex',gap:5,alignItems:'center',fontSize:12,background:T.bg,borderRadius:7,padding:'6px 9px'}}><span style={{color:T.red,fontWeight:600}}>📍 {item.de}</span><span style={{color:T.gray}}>→</span><span style={{color:T.green,fontWeight:600}}>📍 {item.para}</span></div>{item.obs&&<div style={{fontSize:11,color:T.orange,marginTop:5}}>📝 {item.obs}</div>}</div>;
    if(item._tipo==='manejo'){const ti=TM.find(t=>t.v===item.tipoManejo)||{c:T.gray,icon:'💉'};const n=item.animaisIds?.length||0;return<div key={item.id} onClick={()=>setDetailManejo(item)} className="su" style={{...cs,borderLeft:`4px solid ${ti.c}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}><div style={{display:'flex',gap:7,alignItems:'center'}}><span style={{fontSize:18}}>{ti.icon}</span><div><div style={{fontWeight:700,color:T.text,fontSize:14}}>{item.nomeManejo}</div><div style={{fontSize:11,color:T.gray}}>{n} animal{n!==1?'is':''}{item.dose?` · ${item.dose}`:''}</div></div></div><span style={{fontSize:11,color:T.gray,background:T.bg,borderRadius:7,padding:'2px 7px',whiteSpace:'nowrap'}}>{df}</span></div>{item.animaisIdents?.length>0&&<div style={{fontSize:11,color:ti.c,background:ti.c+'12',borderRadius:7,padding:'5px 9px',fontWeight:600,lineHeight:1.5}}>{item.animaisIdents.slice(0,8).join(' · ')}{item.animaisIdents.length>8?` +${item.animaisIdents.length-8} mais`:''}</div>}{item.obs&&<div style={{fontSize:11,color:T.gray,marginTop:5}}>📝 {item.obs}</div>}</div>;}
    if(item._tipo==='nascimento'){const mae=item.maeId?animais.find(a=>a.id===item.maeId):null,id=calcIdade(item.data);return<div key={item.id} className="su" style={{...cs,borderLeft:`4px solid ${T.pink}`,cursor:'default'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div style={{display:'flex',gap:7,alignItems:'center'}}><span style={{fontSize:18}}>🐮</span><div><div style={{fontWeight:700,color:T.text,fontSize:14}}>{item.ident} <span style={{fontSize:11,color:T.pinkDark}}>nasceu!</span></div><div style={{fontSize:11,color:T.gray}}>{item.sexo==='M'?'♂':'♀'}{item.raca?` · ${item.raca}`:''}{item.peso>0?` · ${item.peso}kg`:''}</div>{mae&&<div style={{fontSize:10,color:T.pinkDark,marginTop:1}}>🐄 {mae.ident}</div>}{id&&<div style={{fontSize:10,color:id.cor,marginTop:1,fontWeight:600}}>Hoje com {id.label}</div>}</div></div><span style={{fontSize:11,color:T.gray,background:T.bg,borderRadius:7,padding:'2px 7px',whiteSpace:'nowrap'}}>{df}</span></div></div>;}
    if(item._tipo==='fin'){const isR=item.tipo==='receita',cor=isR?T.gLight:T.red;return<div key={item.id} onClick={()=>setDetailFin(item)} className="su" style={{...cs,borderLeft:`4px solid ${cor}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{display:'flex',gap:9,alignItems:'center'}}><div style={{width:32,height:32,borderRadius:7,background:isR?T.gPale:'#FFE4E6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>{isR?'▲':'▼'}</div><div><div style={{fontWeight:700,color:T.text,fontSize:13}}>{item.cat}</div>{item.desc&&<div style={{fontSize:11,color:T.gray}}>{item.desc}</div>}</div></div><div style={{textAlign:'right',flexShrink:0}}><div style={{fontWeight:800,color:cor,fontSize:14}}>{isR?'+':'-'}{fmtR(item.valor)}</div><div style={{fontSize:10,color:T.gray}}>{df}</div></div></div></div>;}
    return null;
  };
  return <div style={{paddingBottom:100}}>
    {curral&&<CurralTool animais={animais} pastos={pastos} onSalvar={m=>{setManejos(x=>[...x,m]);setCurral(false);}} onFechar={()=>setCurral(false)}/>}
    <PgH sub="Fazendinha" title="Histórico de Manejo 📋"/>
    <div style={{padding:'12px 14px 0'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:12}}>
        {[['Manejos',manejos.filter(m=>m.data?.startsWith(mes)).length,T.purple,T.purplePale],['Trocas',movs.filter(m=>m.data?.startsWith(mes)).length,T.orange,'#FFF3E0'],['Nascim.',animais.filter(a=>a.cat==='Bezerro'&&a.dataNasc?.startsWith(mes)).length,T.pinkDark,T.pinkPale]].map(([l,v,c,bg])=><div key={l} style={{background:bg,borderRadius:11,padding:'9px 6px',textAlign:'center'}}><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:c,fontWeight:700}}>{l}</div><div style={{fontSize:9,color:T.gray}}>este mês</div></div>)}
      </div>
      <button onClick={()=>setCurral(true)} style={{width:'100%',background:`linear-gradient(135deg,${T.gDark},${T.green})`,border:'none',borderRadius:15,padding:'14px 18px',color:'#FFF',fontWeight:700,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:11,marginBottom:14,boxShadow:'0 4px 12px rgba(45,106,79,0.35)'}}>
        <span style={{fontSize:26}}>🏚️</span><div style={{textAlign:'left'}}><div>Abrir Ferramenta de Curral</div><div style={{fontSize:11,opacity:0.8,fontWeight:400,marginTop:1}}>Checklist por brinco para manejos</div></div>
      </button>
      <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:11,scrollbarWidth:'none'}}>{FILTROS.map(f=><button key={f.v} onClick={()=>setFiltro(f.v)} style={{border:`2px solid ${filtro===f.v?f.c:'transparent'}`,borderRadius:20,padding:'7px 14px',fontSize:12,fontWeight:700,background:filtro===f.v?f.c+'18':T.card,color:filtro===f.v?f.c:T.gray,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,transition:'all 0.12s'}}>{f.l}{filtro===f.v&&lista.length>0?` (${lista.length})`:''}</button>)}</div>
      {lista.length===0&&<div style={{textAlign:'center',padding:'44px 20px',color:T.gray}}><div style={{fontSize:44}}>📋</div><div style={{fontSize:15,fontWeight:600,marginTop:11}}>Nenhum registro nesta categoria</div></div>}
      {lista.map(renderCard)}
    </div>
  </div>;
}

// ═══ CALENDÁRIO ═══════════════════════════════════════════════════
function CalendarView({movs,manejos,animais,fin}){
  const T=useT(),[cur,setCur]=useState(()=>new Date()),[sel,setSel]=useState(null);
  const y=cur.getFullYear(),m=cur.getMonth(),firstDow=new Date(y,m,1).getDay(),daysInM=new Date(y,m+1,0).getDate();
  const isoP=`${y}-${String(m+1).padStart(2,'0')}`;
  const allEv=useMemo(()=>{const e=[];movs.forEach(x=>e.push({...x,_tipo:'mov'}));manejos.forEach(x=>e.push({...x,_tipo:'manejo'}));animais.filter(a=>a.cat==='Bezerro'&&a.dataNasc).forEach(b=>e.push({id:`n${b.id}`,data:b.dataNasc,ident:b.ident,_tipo:'nasc'}));fin.forEach(f=>e.push({...f,_tipo:'fin'}));return e;},[movs,manejos,animais,fin]);
  const byDate=useMemo(()=>{const map={};allEv.forEach(e=>{if(!e.data)return;if(!map[e.data])map[e.data]=[];map[e.data].push(e);});return map;},[allEv]);
  const selKey=sel?`${isoP}-${String(sel).padStart(2,'0')}`:null;
  const selEvs=selKey?(byDate[selKey]||[]):[];
  const tipoCor={mov:T.orange,manejo:T.purple,nasc:T.pink,fin:T.blue};
  const tipoIcon={mov:'🔄',manejo:'💉',nasc:'🐮',fin:'💰'};
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <button onClick={()=>setCur(d=>new Date(d.getFullYear(),d.getMonth()-1))} style={{background:T.bg,border:'none',borderRadius:9,width:36,height:36,fontSize:18,cursor:'pointer',color:T.text,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
      <div style={{fontWeight:800,color:T.text,fontSize:15}}>{MESES[m]} {y}</div>
      <button onClick={()=>setCur(d=>new Date(d.getFullYear(),d.getMonth()+1))} style={{background:T.bg,border:'none',borderRadius:9,width:36,height:36,fontSize:18,cursor:'pointer',color:T.text,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',marginBottom:6}}>{['D','S','T','Q','Q','S','S'].map((d,i)=><div key={i} style={{fontSize:10,fontWeight:700,color:T.gray,paddingBottom:4}}>{d}</div>)}</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
      {Array.from({length:firstDow}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:daysInM}).map((_,i)=>{const day=i+1,key=`${isoP}-${String(day).padStart(2,'0')}`,evs=byDate[key]||[];const isToday=key===TODAY,isSel=sel===day;return<div key={day} onClick={()=>setSel(isSel?null:day)} style={{borderRadius:9,padding:'5px 2px',textAlign:'center',cursor:'pointer',background:isSel?T.green:isToday?T.gPale:'transparent',border:`1.5px solid ${isSel?T.green:isToday?T.gLight:'transparent'}`,minHeight:42}}><div style={{fontSize:12,fontWeight:isToday?800:400,color:isSel?'#FFF':T.text}}>{day}</div><div style={{display:'flex',justifyContent:'center',gap:2,marginTop:2,flexWrap:'wrap'}}>{[...new Set(evs.map(e=>e._tipo))].slice(0,3).map(t=><div key={t} style={{width:5,height:5,borderRadius:'50%',background:tipoCor[t]||T.gray}}/>)}</div></div>;})}
    </div>
    {sel&&<div style={{marginTop:14}}><div style={{fontWeight:700,color:T.text,marginBottom:9}}>📅 {String(sel).padStart(2,'0')}/{String(m+1).padStart(2,'0')}/{y}</div>{selEvs.length===0&&<div style={{color:T.gray,fontSize:12,textAlign:'center',padding:14}}>Nenhum evento</div>}{selEvs.map((e,i)=><div key={i} style={{background:T.bg,borderRadius:11,padding:'9px 13px',marginBottom:7,display:'flex',gap:9,alignItems:'center'}}><div style={{width:30,height:30,borderRadius:7,background:(tipoCor[e._tipo]||T.gray)+'1a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{tipoIcon[e._tipo]||'•'}</div><div style={{flex:1}}><div style={{fontWeight:600,color:T.text,fontSize:13}}>{e.ident||e.nomeManejo||e.cat||e._tipo}</div><div style={{fontSize:11,color:T.gray}}>{e.de&&e.para?`${e.de} → ${e.para}`:e.desc||e.dose||''}</div></div>{e.valor&&<div style={{fontWeight:700,color:e.tipo==='receita'?T.gLight:T.red,fontSize:13}}>{e.tipo==='receita'?'+':'-'}{fmtR(e.valor)}</div>}</div>)}</div>}
  </div>;
}

// ═══ APP ══════════════════════════════════════════════════════════
function App(){
  const [dark,setDark]=useState(()=>dbGet('cfg')?.dark||false);
  const T=dark?DARK:LIGHT;
  useEffect(()=>{dbSet('cfg',{dark});document.body.style.background=T.bg;},[dark,T.bg]);
  const [page,setPage]=useState('home'),[globalAction,setGA]=useState(null);
  const [pastos,setP]=useState(()=>dbGet('pastos')||D_PASTOS);
  const [animais,setA]=useState(()=>dbGet('animais')||D_ANIMAIS);
  const [fin,setF]=useState(()=>dbGet('fin')||D_FIN);
  const [movs,setMv]=useState(()=>dbGet('movs')||D_MOVS);
  const [sal,setSl]=useState(()=>dbGet('sal')||D_SAL);
  const [manejos,setMj]=useState(()=>dbGet('manejos')||D_MANEJOS);
  const mk=(k,s)=>fn=>s(prev=>{const n=typeof fn==='function'?fn(prev):fn;dbSet(k,n);return n;});
  const setPastos=mk('pastos',setP),setAnimais=mk('animais',setA),setFin=mk('fin',setF),setMovs=mk('movs',setMv),setSal=mk('sal',setSl),setManejos=mk('manejos',setMj);
  const handleReset=()=>{setP(D_PASTOS);setA(D_ANIMAIS);setF(D_FIN);setMv(D_MOVS);setSl(D_SAL);setMj(D_MANEJOS);dbSet('pastos',D_PASTOS);dbSet('animais',D_ANIMAIS);dbSet('fin',D_FIN);dbSet('movs',D_MOVS);dbSet('sal',D_SAL);dbSet('manejos',D_MANEJOS);setPage('home');};
  useEffect(()=>{
    (async()=>{
      const entries=[['pastos',setP,D_PASTOS],['animais',setA,D_ANIMAIS],['fin',setF,D_FIN],['movs',setMv,D_MOVS],['sal',setSl,D_SAL],['manejos',setMj,D_MANEJOS]];
      for(const[k,setter,def]of entries){const v=await dbLoad(k,def);setter(v&&(Array.isArray(v)?v.length>0:true)?v:def);}
      console.log('Dados carregados do Supabase ✓');
    })();
  },[]);
  const bezNovos=animais.filter(a=>a.status==='ativo'&&a.cat==='Bezerro'&&a.dataNasc&&calcIdade(a.dataNasc)?.dias<7).length;
  const nav=[{id:'home',icon:'🏠',label:'Home'},{id:'pastos',icon:'🌿',label:'Pastos'},{id:'animais',icon:'🐄',label:'Animais'},{id:'financeiro',icon:'💰',label:'Caixa'},{id:'historico',icon:'📋',label:'Manejo'}];
  return <TC.Provider value={T}>
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:T.bg,minHeight:'100vh',maxWidth:500,margin:'0 auto',position:'relative',overflowX:'hidden'}}>
      {page==='home'       &&<Dashboard pastos={pastos} animais={animais} fin={fin} sal={sal} onAction={a=>a==='settings'?setPage('settings'):setGA(a)}/>}
      {page==='pastos'     &&<Pastos pastos={pastos} setPastos={setPastos} animais={animais} sal={sal} setSal={setSal} manejos={manejos} movs={movs}/>}
      {page==='animais'    &&<Animais animais={animais} setAnimais={setAnimais} pastos={pastos} movs={movs} setMovs={setMovs} manejos={manejos}/>}
      {page==='financeiro' &&<Financeiro fin={fin} setFin={setFin}/>}
      {page==='historico'  &&<HistoricoManejo movs={movs} setMovs={setMovs} manejos={manejos} setManejos={setManejos} animais={animais} fin={fin} setFin={setFin} pastos={pastos}/>}
      {page==='settings'   &&<Settings dark={dark} setDark={v=>{setDark(v);dbSet('cfg',{dark:v});}} onReset={handleReset} onClose={()=>setPage('home')} movs={movs} manejos={manejos} animais={animais} fin={fin} pastos={pastos} sal={sal}/>}
      {globalAction&&<GlobalModals action={globalAction} onClose={()=>setGA(null)} pastos={pastos} animais={animais} setAnimais={setAnimais} setSal={setSal} setMovs={setMovs}/>}
      {page!=='settings'&&<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:500,background:T.card,borderTop:`1px solid ${T.border}`,display:'flex',zIndex:300,boxShadow:`0 -4px 20px ${T.shadow}`}}>
        {nav.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,border:'none',background:'none',padding:'10px 0 8px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
          {page===n.id&&<div style={{position:'absolute',top:0,left:'20%',right:'20%',height:3,background:T.green,borderRadius:'0 0 3px 3px'}}/>}
          {n.id==='animais'&&bezNovos>0&&<div style={{position:'absolute',top:4,right:'18%',background:T.pink,color:'#FFF',borderRadius:20,width:16,height:16,fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{bezNovos}</div>}
          <span style={{fontSize:20}}>{n.icon}</span>
          <span style={{fontSize:10,fontWeight:600,color:page===n.id?T.green:T.gray}}>{n.label}</span>
        </button>)}
      </div>}
    </div>
  </TC.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
