          {!confirmReset?<Btn l="🗑️ Resetar Todos os Dados" color={T.red} onClick={()=>setCR(true)}/>
            :<div style={{background:'#FFE4E6',borderRadius:12,padding:14,marginTop:4}}>
              <div style={{fontWeight:700,color:T.red,marginBottom:10,fontSize:15}}>⚠️ Confirmar reset?</div>
              <div style={{fontSize:13,color:T.text,marginBottom:14}}>Todos os dados serão apagados permanentemente.</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button onClick={()=>setCR(false)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:'12px 0',fontWeight:700,cursor:'pointer',color:T.gray,fontSize:14}}>Cancelar</button>
                <button onClick={handleReset} style={{background:T.red,border:'none',borderRadius:10,padding:'12px 0',fontWeight:700,cursor:'pointer',color:'#FFF',fontSize:14}}>🗑️ Sim, apagar</button>
              </div>
            </div>}
        </>}/>
        <Card ch={<SobreCard T={T}/>}/>
      </>}
      {aba==='historico'&&<>
        <div style={{fontWeight:700,color:T.text,marginBottom:12,fontSize:16}}>📅 Calendário de Eventos</div>
        <Card ch={<CalendarView movs={movs} manejos={manejos} animais={animais} fin={fin}/>}/>
      </>}
    </div>
  </div>;
}

// ═══ ADUBAÇÃO ═════════════════════════════════════════════════════
function calcRecomendacao(solo, areaHa) {
  const ph=parseFloat(solo.pH)||0, p=parseFloat(solo.P)||0, k=parseFloat(solo.K)||0;
  const ca=parseFloat(solo.Ca)||0, mg=parseFloat(solo.Mg)||0;
  const ctc=parseFloat(solo.CTC)||0, v=parseFloat(solo.V)||0, mo=parseFloat(solo.MO)||0;
  const area=parseFloat(areaHa)||1;

  // ── Classificações ──────────────────────────────────────────────
  const pHLbl=ph<4.5?'muito ácido':ph<5.5?'ácido':ph<6.0?'moderadamente ácido':ph<7.0?'adequado':'alcalino';
  const PLow=p<15, PVLow=p<6;
  const PLbl=PVLow?'muito baixo':PLow?'baixo':p<30?'médio':'alto';
  const KLow=k<70, KVLow=k<40;
  const KLbl=KVLow?'muito baixo':KLow?'baixo':k<120?'médio':'alto';
  const CaMg=ca+mg;
  const CaMgLbl=CaMg<1.5?'muito baixo':CaMg<3.0?'baixo':CaMg<6.0?'médio':'adequado';
  const VLbl=v<35?'muito baixo':v<50?'baixo':v<70?'médio':'adequado';
  const MOLbl=mo<1.5?'muito baixa':mo<3.0?'baixa':mo<4.5?'média':'alta';

  // ── Correção de acidez (método da saturação de bases — Embrapa) ─
  const needsCalc=ph<5.5||v<50;
  let calcTha=0;
  if(needsCalc && ctc>0){
    // NC (t/ha) = CTC × (V2 − V1) / PRNT  → PRNT=80
    calcTha=Math.max(0, (ctc*(70-v))/80);
  }
  const calcTTotal=(calcTha*area);
  const calcSacosTotal=calcTha>0?Math.ceil((calcTha*1000*area)/50):0;

  // ── Adubação de plantio ─────────────────────────────────────────
  let produto='', qtdPTha=0, justProd='';
  if(PLow){
    produto='8-28-16';
    qtdPTha=PVLow?400:350;
    justProd=`Fósforo ${PLbl} (${p} mg/dm³) — fórmula 8-28-16 prioriza correção fosfatada`;
  } else if(KLow){
    produto='20-05-20';
    qtdPTha=KVLow?300:250;
    justProd=`Potássio ${KLbl} com fósforo adequado — fórmula 20-05-20 supre N e K`;
  } else {
    produto='4-14-8';
    qtdPTha=200;
    justProd='Solo em nível de manutenção — fórmula 4-14-8 equilibrada para pastagem';
  }
  const qtdPTotal=qtdPTha*area;
  const pSacosHa=Math.ceil(qtdPTha/50);
  const pSacosTotal=Math.ceil(qtdPTotal/50);

  // ── Adubação de cobertura ───────────────────────────────────────
  const prodCob='Ureia protegida 47%';
  const qtdCTha=100;
  const qtdCTotal=qtdCTha*area;
  const cSacosHa=Math.ceil(qtdCTha/50);
  const cSacosTotal=Math.ceil(qtdCTotal/50);

  // ── Diagnóstico ─────────────────────────────────────────────────
  const diag=[`pH ${ph} (${pHLbl})`,`P ${PLbl} (${p} mg/dm³)`,`K ${KLbl} (${k} mg/dm³)`,`Ca+Mg ${CaMgLbl}`,`V% ${v}% (${VLbl})`,mo>0?`MO ${MOLbl} (${mo}%)`:null].filter(Boolean).join(', ')+'.';
  const corrMsg=needsCalc?`pH ${ph<5.5?`ácido (pH ${ph})`:''}${ph<5.5&&v<50?' e ':''}${v<50?`V% baixo (${v}%)`:''} exige correção.`:'pH e V% adequados — sem calcário necessário.';
  const just=`${justProd}. ${corrMsg}`;

  return{
    diagnostico:diag, needsCalc, calcTha:calcTha.toFixed(2), calcTTotal:calcTTotal.toFixed(2), calcSacosTotal,
    produto, qtdPTha, pSacosHa, qtdPTotal:qtdPTotal.toFixed(0), pSacosTotal,
    prodCob, qtdCTha, cSacosHa, qtdCTotal:qtdCTotal.toFixed(0), cSacosTotal,
    justificativa:just, area
  };
}

function Adubacao({adubacoes,setAdubacoes,pastos}){
  const T=useT();
  const [view,setView]=useState('historico'); // 'historico' | 'nova' | 'detalhe' | 'relatorio'
  const [sel,setSel]=useState(null);
  const [editId,setEditId]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [relatorio,setRelatorio]=useState(null);

  const emptyForm={pastoId:'',areaHa:'',data:TODAY,pH:'',P:'',K:'',Ca:'',Mg:'',Al:'',HAl:'',CTC:'',V:'',MO:'',obs:''};
  const [form,setForm]=useState(emptyForm);
  const ff=k=>v=>setForm(f=>({...f,[k]:v}));

  const nomePasto=id=>pastos.find(p=>p.id===id)?.nome||'—';

  const formValid=form.pH&&form.P&&form.K&&form.CTC&&form.V&&form.areaHa;

  const handleSave=()=>{
    if(!formValid)return;
    const rec=calcRecomendacao(form,form.areaHa);
    const entry={
      id:editId||Date.now(), data:form.data,
      pastoId:form.pastoId?+form.pastoId:null,
      areaHa:+form.areaHa,
      nomePasto:form.pastoId?nomePasto(+form.pastoId):'—',
      solo:{...form}, rec
    };
    if(editId){setAdubacoes(a=>a.map(x=>x.id===editId?entry:x));setEditId(null);}
    else{setAdubacoes(a=>[entry,...a]);}
    setForm(emptyForm);setView('historico');
  };

  const handleEdit=e=>{setForm({...e.solo,data:e.data,pastoId:e.pastoId?String(e.pastoId):'',areaHa:String(e.areaHa)});setEditId(e.id);setSel(null);setView('nova');};
  const handleDelete=id=>{setAdubacoes(a=>a.filter(x=>x.id!==id));setSel(null);setConfirmDel(null);setView('historico');};

  const gerarRelatorio=e=>{
    const r=e.rec;
    const lines=[
      `ANÁLISE DE SOLO — ${fmtD(e.data)}`,
      `Pasto: ${e.nomePasto||'—'} | Área: ${e.areaHa} ha`,
      ``,
      `DIAGNÓSTICO DO SOLO`,
      r.diagnostico,
      ``,
      r.needsCalc
        ?[`CORREÇÃO`,`Calcário: ${r.calcTha} t/ha`,`Total para ${e.areaHa} ha: ${r.calcTTotal} toneladas`].join('\n')
        :`CORREÇÃO\nNão necessária — pH e V% adequados.`,
      ``,
      `ADUBAÇÃO DE PLANTIO`,
      `${r.produto} → ${r.qtdPTha} kg/ha`,
      `${r.pSacosHa} saco(s) de 50kg/ha`,
      `Total: ${r.qtdPTotal} kg | ${r.pSacosTotal} sacos`,
      ``,
      `ADUBAÇÃO DE COBERTURA`,
      `${r.prodCob} → ${r.qtdCTha} kg/ha`,
      `${r.cSacosHa} saco(s) de 50kg/ha`,
      `Total: ${r.qtdCTotal} kg | ${r.cSacosTotal} sacos`,
      ``,
      `RESUMO TOTAL (${e.areaHa} ha)`,
      r.needsCalc?`• Calcário: ${r.calcTTotal} toneladas`:'',
      `• ${r.produto}: ${r.pSacosTotal} sacos (${r.qtdPTotal} kg)`,
      `• ${r.prodCob}: ${r.cSacosTotal} sacos (${r.qtdCTotal} kg)`,
      ``,
      `JUSTIFICATIVA`,
      r.justificativa,
    ].filter(l=>l!==undefined).join('\n');
    setRelatorio(lines);setView('relatorio');
  };

  // ── Render: detalhe ──────────────────────────────────────────────
  if(view==='detalhe'&&sel){
    const e=adubacoes.find(x=>x.id===sel);
    if(!e){setView('historico');return null;}
    const r=e.rec;
    const greenBox={background:T.green,borderRadius:14,padding:16,marginBottom:10,color:'#FFF'};
    const grayBox={background:T.bg,borderRadius:12,padding:14,marginBottom:10};
    return <div style={{paddingBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 14px 10px'}}>
        <button onClick={()=>{setView('historico');setSel(null);}} style={{background:T.bg,border:'none',borderRadius:10,padding:'9px 15px',fontWeight:700,cursor:'pointer',color:T.text,fontSize:15}}>‹</button>
        <div style={{fontWeight:800,color:T.text,fontSize:16}}>🌱 Análise — {fmtD(e.data)}</div>
      </div>
      <div style={{padding:'0 14px'}}>
        <div style={{background:T.gPale,borderRadius:14,padding:14,marginBottom:12,border:`1.5px solid ${T.gLight}40`}}>
          <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4}}>
            <div><div style={{fontWeight:800,color:T.gDark,fontSize:15}}>📍 {e.nomePasto||'Sem pasto'}</div><div style={{fontSize:12,color:T.gray}}>📅 {fmtD(e.data)} · {e.areaHa} ha</div></div>
          </div>
        </div>

        <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>🔬 Diagnóstico do Solo</div>
        <div style={grayBox}><div style={{fontSize:14,color:T.text,lineHeight:1.6}}>{r.diagnostico}</div></div>

        {r.needsCalc&&<>
          <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>🪨 Correção com Calcário</div>
          <div style={{...greenBox,background:`linear-gradient(135deg,#5c4a1e,#a07a2a)`}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div style={{textAlign:'center'}}><div style={{fontSize:10,opacity:.7,fontWeight:700}}>POR HECTARE</div><div style={{fontSize:32,fontWeight:800,lineHeight:1}}>{r.calcTha}<span style={{fontSize:14}}> t/ha</span></div></div>
              <div style={{textAlign:'center'}}><div style={{fontSize:10,opacity:.7,fontWeight:700}}>TOTAL ({e.areaHa} ha)</div><div style={{fontSize:32,fontWeight:800,lineHeight:1}}>{r.calcTTotal}<span style={{fontSize:14}}> t</span></div></div>
            </div>
          </div>
        </>}
        {!r.needsCalc&&<div style={{background:'#D8F3DC',borderRadius:12,padding:12,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:20}}>✅</span><div style={{fontSize:13,color:'#1B4332',fontWeight:600}}>pH e V% adequados — sem necessidade de calcário</div></div>}

        <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>🌿 Adubação de Plantio</div>
        <div style={greenBox}>
          <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>{r.produto}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[['kg/ha',`${r.qtdPTha}`],['sacos/ha',`${r.pSacosHa}`],['total sacos',`${r.pSacosTotal}`]].map(([l,v])=><div key={l} style={{background:'rgba(255,255,255,0.18)',borderRadius:10,padding:'8px 4px',textAlign:'center'}}><div style={{fontSize:9,opacity:.8,fontWeight:700,textTransform:'uppercase'}}>{l}</div><div style={{fontSize:22,fontWeight:800,lineHeight:1.1}}>{v}</div></div>)}
          </div>
          <div style={{fontSize:11,opacity:.75,marginTop:8}}>Total: {r.qtdPTotal} kg para {e.areaHa} ha</div>
        </div>

        <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>🌾 Adubação de Cobertura</div>
        <div style={{...greenBox,background:`linear-gradient(135deg,${T.blue},${T.bLight})`}}>
          <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>{r.prodCob}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[['kg/ha',`${r.qtdCTha}`],['sacos/ha',`${r.cSacosHa}`],['total sacos',`${r.cSacosTotal}`]].map(([l,v])=><div key={l} style={{background:'rgba(255,255,255,0.18)',borderRadius:10,padding:'8px 4px',textAlign:'center'}}><div style={{fontSize:9,opacity:.8,fontWeight:700,textTransform:'uppercase'}}>{l}</div><div style={{fontSize:22,fontWeight:800,lineHeight:1.1}}>{v}</div></div>)}
          </div>
          <div style={{fontSize:11,opacity:.75,marginTop:8}}>Total: {r.qtdCTotal} kg para {e.areaHa} ha</div>
        </div>

        <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>📦 Resumo Total</div>
        <div style={{background:T.card,borderRadius:14,padding:14,marginBottom:10,border:`1.5px solid ${T.border}`}}>
          {r.needsCalc&&<InfoRow label="🪨 Calcário" value={`${r.calcTTotal} toneladas`} color='#a07a2a'/>}
          <InfoRow label={`🌿 ${r.produto}`} value={`${r.pSacosTotal} sacos · ${r.qtdPTotal} kg`} color={T.green}/>
          <InfoRow label={`🌾 ${r.prodCob}`} value={`${r.cSacosTotal} sacos · ${r.qtdCTotal} kg`} color={T.blue}/>
        </div>

        <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>💡 Justificativa</div>
        <div style={{...grayBox,border:`1.5px solid ${T.border}`}}><div style={{fontSize:13,color:T.text,lineHeight:1.7}}>{r.justificativa}</div></div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:6}}>
          <button onClick={()=>gerarRelatorio(e)} style={{background:T.purple,border:'none',borderRadius:13,padding:'13px 0',color:'#FFF',fontWeight:700,fontSize:14,cursor:'pointer'}}>📄 Relatório</button>
          <button onClick={()=>handleEdit(e)} style={{background:T.blue,border:'none',borderRadius:13,padding:'13px 0',color:'#FFF',fontWeight:700,fontSize:14,cursor:'pointer'}}>✏️ Editar</button>
        </div>
        {confirmDel===e.id
          ?<div style={{background:'#FFE4E6',borderRadius:13,padding:14,marginTop:8}}>
              <div style={{fontWeight:700,color:T.red,marginBottom:8}}>⚠️ Excluir esta análise?</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button onClick={()=>setConfirmDel(null)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:'11px',fontWeight:700,cursor:'pointer',color:T.gray}}>Cancelar</button>
                <button onClick={()=>handleDelete(e.id)} style={{background:T.red,border:'none',borderRadius:10,padding:'11px',fontWeight:700,cursor:'pointer',color:'#FFF'}}>🗑️ Excluir</button>
              </div>
            </div>
          :<button onClick={()=>setConfirmDel(e.id)} style={{width:'100%',background:'#FFE4E6',border:'none',borderRadius:13,padding:'13px 0',color:T.red,fontWeight:700,fontSize:14,cursor:'pointer',marginTop:8}}>🗑️ Excluir Análise</button>}
        <div style={{height:24}}/>
      </div>
    </div>;
  }

  // ── Render: relatório ────────────────────────────────────────────
  if(view==='relatorio'&&relatorio){
    return <div style={{paddingBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 14px 10px'}}>
        <button onClick={()=>{setView('detalhe');}} style={{background:T.bg,border:'none',borderRadius:10,padding:'9px 15px',fontWeight:700,cursor:'pointer',color:T.text,fontSize:15}}>‹</button>
        <div style={{fontWeight:800,color:T.text,fontSize:16}}>📄 Relatório</div>
      </div>
      <div style={{padding:'0 14px'}}>
        <div style={{background:T.card,borderRadius:14,border:`1.5px solid ${T.border}`,padding:16,marginBottom:14}}>
          <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-word',fontSize:13,color:T.text,lineHeight:1.8,fontFamily:'inherit',margin:0}}>{relatorio}</pre>
        </div>
        <button onClick={()=>{if(navigator.share){navigator.share({title:'Recomendação de Adubação',text:relatorio});}else{navigator.clipboard?.writeText(relatorio).then(()=>alert('Copiado!'));}}} style={{width:'100%',background:T.green,border:'none',borderRadius:13,padding:'14px 0',color:'#FFF',fontWeight:700,fontSize:15,cursor:'pointer',marginBottom:10}}>📋 Copiar / Compartilhar</button>
        <button onClick={()=>setView('detalhe')} style={{width:'100%',background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:13,padding:'13px 0',color:T.text,fontWeight:700,fontSize:14,cursor:'pointer'}}>‹ Voltar</button>
        <div style={{height:24}}/>
      </div>
    </div>;
  }

  // ── Render: nova análise / edição ────────────────────────────────
  if(view==='nova'){
    const preview=formValid?calcRecomendacao(form,form.areaHa):null;
    return <div style={{paddingBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 14px 10px'}}>
        <button onClick={()=>{setView('historico');setForm(emptyForm);setEditId(null);}} style={{background:T.bg,border:'none',borderRadius:10,padding:'9px 15px',fontWeight:700,cursor:'pointer',color:T.text,fontSize:15}}>‹</button>
        <div style={{fontWeight:800,color:T.text,fontSize:16}}>{editId?'✏️ Editar':'🌱 Nova'} Análise de Solo</div>
      </div>
      <div style={{padding:'0 14px'}}>
        <div style={{background:T.gPale,borderRadius:14,padding:12,marginBottom:14,border:`1.5px solid ${T.gLight}40`}}>
          <div style={{fontSize:11,color:T.gDark,fontWeight:700}}>📋 Preencha os dados da análise de solo. Campos obrigatórios: pH, P, K, CTC, V% e Área.</div>
        </div>
        <Sel label="Pasto *" value={form.pastoId} onChange={ff('pastoId')} opts={[{v:'',l:'Selecionar pasto...'},...pastos.map(p=>({v:String(p.id),l:p.nome}))]}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Inp label="Área (ha) *" value={form.areaHa} onChange={ff('areaHa')} type="number" placeholder="Ex: 12"/>
          <Inp label="Data" value={form.data} onChange={ff('data')} type="date"/>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:T.gray,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8,marginTop:4}}>Dados da Análise de Solo</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Inp label="pH *" value={form.pH} onChange={ff('pH')} type="number" placeholder="Ex: 5.2"/>
          <Inp label="MO (%)" value={form.MO} onChange={ff('MO')} type="number" placeholder="Ex: 2.8"/>
          <Inp label="P (mg/dm³) *" value={form.P} onChange={ff('P')} type="number" placeholder="Ex: 8"/>
          <Inp label="K (mg/dm³)" value={form.K} onChange={ff('K')} type="number" placeholder="Ex: 55"/>
          <Inp label="Ca (cmolc/dm³)" value={form.Ca} onChange={ff('Ca')} type="number" placeholder="Ex: 1.8"/>
          <Inp label="Mg (cmolc/dm³)" value={form.Mg} onChange={ff('Mg')} type="number" placeholder="Ex: 0.6"/>
          <Inp label="Al (cmolc/dm³)" value={form.Al} onChange={ff('Al')} type="number" placeholder="Ex: 0.4"/>
          <Inp label="H+Al (cmolc/dm³)" value={form.HAl} onChange={ff('HAl')} type="number" placeholder="Ex: 4.8"/>
          <Inp label="CTC (cmolc/dm³) *" value={form.CTC} onChange={ff('CTC')} type="number" placeholder="Ex: 7.2"/>
          <Inp label="V% *" value={form.V} onChange={ff('V')} type="number" placeholder="Ex: 38"/>
        </div>
        <Inp label="Observações" value={form.obs} onChange={ff('obs')} placeholder="Opcional..."/>

        {preview&&<div style={{background:T.gDark,borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:11,fontWeight:700,marginBottom:10}}>⚡ PRÉ-VISUALIZAÇÃO DA RECOMENDAÇÃO</div>
          <div style={{color:'#FFF',fontSize:13,lineHeight:1.7}}>
            {preview.needsCalc&&<div>🪨 Calcário: <b>{preview.calcTha} t/ha</b> · Total: <b>{preview.calcTTotal} t</b></div>}
            <div>🌿 Plantio: <b>{preview.produto}</b> — {preview.qtdPTha} kg/ha · {preview.pSacosHa} saco(s)/ha</div>
            <div>🌾 Cobertura: <b>{preview.prodCob}</b> — {preview.qtdCTha} kg/ha</div>
          </div>
        </div>}

        <Btn l={editId?'💾 Salvar Alterações':'✅ Gerar Recomendação'} onClick={handleSave} dis={!formValid}/>
        <div style={{height:24}}/>
      </div>
    </div>;
  }

  // ── Render: histórico (default) ──────────────────────────────────
  return <div style={{paddingBottom:20}}>
    <Btn l="+ Nova Análise de Solo" icon="🌱" onClick={()=>{setForm(emptyForm);setEditId(null);setView('nova');}} style={{margin:'12px 0 14px'}}/>
    {adubacoes.length===0
      ?<div style={{textAlign:'center',padding:'40px 20px',color:T.gray}}>
          <div style={{fontSize:48,marginBottom:12}}>🌱</div>
          <div style={{fontSize:15,fontWeight:600}}>Nenhuma análise registrada</div>
          <div style={{fontSize:12,marginTop:6}}>Clique em "Nova Análise" para começar</div>
        </div>
      :<div>
        {adubacoes.map(e=>{
          const r=e.rec;
          return<div key={e.id} onClick={()=>{setSel(e.id);setView('detalhe');}} style={{background:T.card,borderRadius:16,padding:14,marginBottom:10,cursor:'pointer',boxShadow:`0 2px 8px ${T.shadow}`,border:`1.5px solid ${T.border}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:T.text}}>📍 {e.nomePasto||'Sem pasto'}</div>
                <div style={{fontSize:12,color:T.gray,marginTop:2}}>📅 {fmtD(e.data)} · {e.areaHa} ha</div>
              </div>
              <span style={{color:T.gray,fontSize:20}}>›</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
              {r.needsCalc&&<div style={{background:'#FFF8E1',borderRadius:10,padding:'8px 10px'}}><div style={{fontSize:10,color:'#7B5800',fontWeight:700}}>🪨 CALCÁRIO</div><div style={{fontSize:13,fontWeight:800,color:'#a07a2a'}}>{r.calcTTotal} t</div></div>}
              <div style={{background:T.gPale,borderRadius:10,padding:'8px 10px'}}><div style={{fontSize:10,color:T.gDark,fontWeight:700}}>🌿 PLANTIO</div><div style={{fontSize:13,fontWeight:800,color:T.green}}>{r.pSacosTotal} sc · {r.produto}</div></div>
              <div style={{background:T.bluePale,borderRadius:10,padding:'8px 10px'}}><div style={{fontSize:10,color:T.blue,fontWeight:700}}>🌾 COBERTURA</div><div style={{fontSize:13,fontWeight:800,color:T.blue}}>{r.cSacosTotal} sc · Ureia</div></div>
            </div>
          </div>;
        })}
      </div>}
  </div>;
}

// ═══ CONFINAMENTO ═════════════════════════════════════════════════
// Dieta padrão confinamento — proporções fixas, embasadas
const DIETA=[
  {id:1, nome:'Silagem de capim', pct:55, cor:'#2D6A4F', sacosKg:null,  unid:'tonelada'},
  {id:2, nome:'Fubá de milho',    pct:22, cor:'#F4A261', sacosKg:30,    unid:'saco 30 kg'},
  {id:3, nome:'Farelo de soja',   pct:13, cor:'#5390D9', sacosKg:30,    unid:'saco 30 kg'},
  {id:4, nome:'Sal proteínado',   pct:7,  cor:'#E63946', sacosKg:25,    unid:'saco 25 kg'},
  {id:5, nome:'Núcleo mineral',   pct:3,  cor:'#8338EC', sacosKg:25,    unid:'saco 25 kg'},
];

// GMD típico confinamento (presets)
const GMD_PRESETS=[
  {v:'0.9', l:'Baixo',  sub:'0,9 kg/dia',  desc:'Raça zebuína extensiva'},
  {v:'1.2', l:'Médio',  sub:'1,2 kg/dia',  desc:'Padrão nelore confinado'},
  {v:'1.5', l:'Alto',   sub:'1,5 kg/dia',  desc:'Cruzado / genética melhorada'},
  {v:'cust',l:'Outro',  sub:'Personalizar', desc:''},
];

function Confinamento(){
  const T=useT();

  // ── Entradas ─────────────────────────────────────────────────────
  const [nAnim, setNA]  = useState('50');
  const [pIni,  setPI]  = useState('380');
  const [gmdSel,setGS]  = useState('1.2');   // preset selecionado ou 'cust'
  const [gmdCust,setGC] = useState('');       // valor digitado quando 'cust'
  const [dias,  setDias]= useState('90');
  const [pAlvo, setPA]  = useState('700');
  const [tab,   setTab] = useState('resumo');

  const gmd = gmdSel==='cust'?(parseFloat(gmdCust)||0):parseFloat(gmdSel)||0;

  // helpers
  const n  = v=>parseFloat(v)||0;
  const f1 = v=>(+v).toLocaleString('pt-BR',{maximumFractionDigits:1});
  const f0 = v=>Math.round(+v).toLocaleString('pt-BR');
  const fmtKg = v => v>=1000
    ? `${(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:2})} t`
    : `${Math.round(v).toLocaleString('pt-BR')} kg`;

  // ── Cálculos base ─────────────────────────────────────────────────
  const ok = n(nAnim)>0 && n(pIni)>0 && gmd>0 && n(dias)>0;

  const pSaida     = n(pIni) + gmd * n(dias);
  const pMedioLote = (n(pIni) + pSaida) / 2;          // peso médio durante período
  const consDia    = pMedioLote * 0.025;               // 2,5% PV — padrão confinamento
  const consDiaLote= consDia * n(nAnim);
  const totalAlim  = consDiaLote * n(dias);
  const ganhoAnim  = pSaida - n(pIni);
  const ganhoLote  = ganhoAnim * n(nAnim);
  const diasAlvo   = gmd>0 && n(pAlvo)>n(pIni) ? Math.ceil((n(pAlvo)-n(pIni))/gmd) : null;
  const arrSaida   = (pSaida/15)*n(nAnim);
  const arrEnt     = (n(pIni)/15)*n(nAnim);
  const arrGanho   = arrSaida - arrEnt;
  const efic       = consDia>0 ? ((gmd/consDia)*100).toFixed(1) : 0;
  const baixoGmd   = gmd < 0.8 && gmd > 0;

  // ── Por ingrediente ───────────────────────────────────────────────
  const ingCalc = DIETA.map(ig=>{
    const kgDiaLote = (ig.pct/100)*consDiaLote;
    const kgTotal   = kgDiaLote*n(dias);
    const tTotal    = kgTotal/1000;
    const sacos     = ig.sacosKg ? Math.ceil(kgTotal/ig.sacosKg) : null;
    return{...ig, kgDiaLote, kgTotal, tTotal, sacos};
  });

  // ── Helpers de UI ─────────────────────────────────────────────────
  const TabBtn=({id,label,icon})=><button onClick={()=>setTab(id)}
    style={{flex:1,border:'none',borderRadius:10,padding:'9px 4px',fontWeight:700,
      fontSize:12,cursor:'pointer',
      background:tab===id?T.gDark:'transparent',
      color:tab===id?'#FFF':T.gray}}>
    {icon} {label}
  </button>;

  const Row=({l,v,hl})=><div style={{display:'flex',justifyContent:'space-between',
    alignItems:'center',padding:'7px 0',borderBottom:`1px solid rgba(255,255,255,0.08)`}}>
    <span style={{color:'rgba(255,255,255,0.65)',fontSize:12}}>{l}</span>
    <span style={{color:hl||'#FFF',fontSize:13,fontWeight:700}}>{v}</span>
  </div>;

  return <div style={{paddingBottom:16}}>

    {/* ── DADOS DO LOTE ── */}
    <div style={{background:T.gPale,borderRadius:16,padding:14,marginBottom:14,border:`1.5px solid ${T.gLight}30`}}>
      <div style={{fontWeight:800,color:T.gDark,fontSize:13,marginBottom:12}}>🐄 Dados do Lote</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <Inp label="Nº de animais" value={nAnim} onChange={setNA} type="number" placeholder="50"/>
        <Inp label="Peso inicial (kg)" value={pIni} onChange={setPI} type="number" placeholder="380"/>
        <Inp label="Dias de confinamento" value={dias} onChange={setDias} type="number" placeholder="90"/>
        <Inp label="Peso-alvo (kg)" value={pAlvo} onChange={setPA} type="number" placeholder="700"/>
      </div>

      {/* GMD presets */}
      <div style={{fontSize:11,fontWeight:700,color:T.gray,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>GMD esperado — padrão confinamento</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom: gmdSel==='cust'?10:0}}>
        {GMD_PRESETS.map(p=><button key={p.v} onClick={()=>setGS(p.v)}
          style={{border:`2px solid ${gmdSel===p.v?T.green:T.border}`,borderRadius:12,
            padding:'10px 8px',cursor:'pointer',textAlign:'center',
            background:gmdSel===p.v?T.gPale:T.card}}>
          <div style={{fontSize:13,fontWeight:800,color:gmdSel===p.v?T.green:T.text}}>{p.l}</div>
          <div style={{fontSize:11,color:gmdSel===p.v?T.gDark:T.gray,marginTop:1}}>{p.sub}</div>
          {p.desc&&<div style={{fontSize:9,color:T.gray,marginTop:1,lineHeight:1.3}}>{p.desc}</div>}
        </button>)}
      </div>
      {gmdSel==='cust'&&<Inp label="GMD personalizado (kg/dia)" value={gmdCust} onChange={setGC} type="number" placeholder="Ex: 1.3"/>}

      {/* consumo auto */}
      {ok&&<div style={{background:T.card,borderRadius:10,padding:'10px 12px',marginTop:10,border:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:T.gray}}>Consumo médio calculado</div>
          <div style={{fontSize:10,color:T.gray,marginTop:1}}>2,5% do peso vivo médio ({f1(pMedioLote)} kg)</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:17,fontWeight:800,color:T.gDark}}>{f1(consDia)} <span style={{fontSize:11}}>kg/animal/dia</span></div>
          <div style={{fontSize:11,color:T.gray}}>{f1(consDiaLote)} kg/dia no lote</div>
        </div>
      </div>}

      {baixoGmd&&<div style={{background:'#FFF3E0',borderRadius:10,padding:'8px 12px',marginTop:10,display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{fontSize:12,color:'#E65100',fontWeight:600}}>GMD abaixo de 0,8 kg/dia — revise a dieta ou condição corporal.</span>
      </div>}
    </div>

    {/* ── BARRA VISUAL DA DIETA ── */}
    <div style={{background:T.card,borderRadius:16,padding:14,marginBottom:14,border:`1.5px solid ${T.border}`}}>
      <div style={{fontWeight:800,color:T.text,fontSize:13,marginBottom:10}}>🌾 Composição da Dieta (padrão confinamento)</div>
      <div style={{display:'flex',borderRadius:8,overflow:'hidden',height:14,marginBottom:12}}>
        {DIETA.map(ig=><div key={ig.id} title={`${ig.nome} ${ig.pct}%`}
          style={{width:`${ig.pct}%`,background:ig.cor}}/>)}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {DIETA.map(ig=><div key={ig.id} style={{display:'flex',alignItems:'center',gap:5,background:T.bg,borderRadius:20,padding:'4px 10px',border:`1px solid ${ig.cor}30`}}>
          <div style={{width:8,height:8,borderRadius:2,background:ig.cor}}/>
          <span style={{fontSize:11,color:T.text,fontWeight:600}}>{ig.nome}</span>
          <span style={{fontSize:11,color:ig.cor,fontWeight:800}}>{ig.pct}%</span>
        </div>)}
      </div>
    </div>

    {/* ── ABAS DE RESULTADO ── */}
    {ok&&<>
      <div style={{display:'flex',gap:6,background:T.card,borderRadius:12,padding:4,
        marginBottom:14,border:`1.5px solid ${T.border}`}}>
        <TabBtn id="resumo"      label="Resumo"      icon="📊"/>
        <TabBtn id="ingredientes"label="Quantidades"  icon="🌾"/>
      </div>

      {/* ══ RESUMO ══ */}
      {tab==='resumo'&&<>
        {/* KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          {[
            {icon:'🐄',label:'Peso de saída',  val:`${f1(pSaida)} kg`,     sub:`+${f1(ganhoAnim)} kg/animal`, cor:T.green},
            {icon:'⏱️',label:'Dias até alvo',  val:diasAlvo&&diasAlvo>0?`${diasAlvo} d`:'—', sub:`Meta ${n(pAlvo)} kg`, cor:T.blue},
            {icon:'📈',label:'Ganho do lote',  val:`${f0(ganhoLote)} kg`,   sub:`${f1(arrGanho)} @`, cor:'#7B2FBE'},
            {icon:'🌾',label:'Alimento total', val:fmtKg(totalAlim),        sub:`${f1(consDiaLote)} kg/dia`, cor:'#E65100'},
          ].map(k=><div key={k.label} style={{background:T.card,borderRadius:14,padding:12,
            border:`1.5px solid ${k.cor}25`}}>
            <div style={{fontSize:18,marginBottom:4}}>{k.icon}</div>
            <div style={{fontSize:10,fontWeight:700,color:T.gray,textTransform:'uppercase',letterSpacing:'.3px'}}>{k.label}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.cor,lineHeight:1.1,marginTop:3}}>{k.val}</div>
            <div style={{fontSize:10,color:T.gray,marginTop:2}}>{k.sub}</div>
          </div>)}
        </div>

        {/* Gráfico evolução peso */}
        <div style={{background:T.card,borderRadius:16,padding:14,marginBottom:10,border:`1.5px solid ${T.border}`}}>
          <div style={{fontWeight:700,color:T.text,fontSize:13,marginBottom:10}}>📏 Evolução de Peso no Período</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:2,height:68,marginBottom:8}}>
            {Array.from({length:10}).map((_,i)=>{
              const d=Math.round((n(dias)/9)*i);
              const p=n(pIni)+gmd*d;
              const maxP=pSaida, minP=n(pIni);
              const h=maxP>minP?((p-minP)/(maxP-minP)*52)+16:32;
              const isAlvo=n(pAlvo)>0&&p>=n(pAlvo)&&(i===0||n(pIni)+gmd*Math.round((n(dias)/9)*(i-1))<n(pAlvo));
              return<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                {isAlvo&&<div style={{fontSize:8,color:T.green,fontWeight:700}}>🎯</div>}
                <div style={{width:'75%',background:`linear-gradient(180deg,${T.green},${T.gDark})`,
                  borderRadius:'3px 3px 0 0',height:`${h}px`}}/>
                <div style={{fontSize:8,color:T.gray}}>{d}d</div>
              </div>;
            })}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:T.gray}}>
            <span>Entrada: <b style={{color:T.text}}>{n(pIni)} kg</b></span>
            {n(pAlvo)>n(pIni)&&n(pAlvo)<pSaida&&<span>🎯 Alvo: <b style={{color:T.green}}>{n(pAlvo)} kg</b></span>}
            <span>Saída: <b style={{color:T.green}}>{f1(pSaida)} kg</b></span>
          </div>
        </div>

        {/* Resumo escuro */}
        <div style={{background:'linear-gradient(135deg,#1a2f1a,#2D5016)',borderRadius:16,padding:16,marginBottom:10}}>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:10,fontWeight:700,
            textTransform:'uppercase',letterSpacing:'.6px',marginBottom:10}}>📋 Resumo do Confinamento</div>
          <Row l="🐄 Animais"           v={`${n(nAnim)} cabeças`}/>
          <Row l="⚖️ Arrobas na entrada" v={`${f1(arrEnt)} @`}/>
          <Row l="📈 Arrobas na saída"   v={`${f1(arrSaida)} @`} hl='#52B788'/>
          <Row l="🏆 Ganho total em @"   v={`${f1(arrGanho)} @`} hl='#FFD166'/>
          <Row l="⚡ Eficiência alimentar" v={`${efic}% (${gmd} kg ganho / ${f1(consDia)} kg ingerido)`}/>
          <Row l="🌾 Consumo total do lote" v={fmtKg(totalAlim)}/>
          <Row l="🔄 Consumo/animal/dia"  v={`${f1(consDia)} kg (2,5% PV médio)`}/>
          {diasAlvo&&diasAlvo>0&&<Row l={`📅 Dias p/ atingir ${n(pAlvo)} kg`} v={`${diasAlvo} dias`} hl='#74C0FC'/>}
          {baixoGmd&&<div style={{background:'rgba(246,112,0,.22)',borderRadius:10,
            padding:'8px 10px',marginTop:10,fontSize:12,color:'#FFD166',fontWeight:600}}>
            ⚠️ GMD abaixo de 0,8 kg/dia — considere revisar a dieta.
          </div>}
        </div>
      </>}

      {/* ══ QUANTIDADES ══ */}
      {tab==='ingredientes'&&<>
        {/* Cabeçalho total */}
        <div style={{background:T.green,borderRadius:16,padding:16,marginBottom:12,textAlign:'center'}}>
          <div style={{color:'rgba(255,255,255,0.75)',fontSize:11,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>
            Total de alimento — {n(nAnim)} animais × {n(dias)} dias
          </div>
          <div style={{color:'#FFF',fontSize:40,fontWeight:800,lineHeight:1}}>{fmtKg(totalAlim)}</div>
          <div style={{color:'rgba(255,255,255,0.8)',fontSize:13,marginTop:6}}>
            {f1(consDiaLote)} kg/dia no lote · {f1(consDia)} kg/animal/dia
          </div>
        </div>

        {/* Card por ingrediente */}
        {ingCalc.map(ig=><div key={ig.id} style={{background:T.card,borderRadius:16,
          padding:14,marginBottom:10,border:`2px solid ${ig.cor}30`}}>
          {/* header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:12,height:12,borderRadius:3,background:ig.cor}}/>
              <div style={{fontWeight:800,color:T.text,fontSize:14}}>{ig.nome}</div>
            </div>
            <div style={{background:`${ig.cor}18`,color:ig.cor,fontSize:12,fontWeight:800,
              padding:'3px 10px',borderRadius:20}}>{ig.pct}% da dieta</div>
          </div>

          {/* barra proporcional */}
          <div style={{height:6,background:T.border,borderRadius:4,marginBottom:12,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${ig.pct}%`,background:ig.cor,borderRadius:4}}/>
          </div>

          {/* valores */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[
              ['kg/dia lote', `${f0(ig.kgDiaLote)}`, 'kg', T.text],
              ['kg no período', `${f0(ig.kgTotal)}`, 'kg', ig.cor],
              ig.sacos
                ? ['sacos necessários', `${ig.sacos}`, ig.unid, ig.cor]
                : ['toneladas', `${ig.tTotal.toLocaleString('pt-BR',{maximumFractionDigits:2})}`, 't', ig.cor],
            ].map(([lbl,val,unit,cor])=><div key={lbl} style={{background:T.bg,borderRadius:12,
              padding:'10px 6px',textAlign:'center',border:`1px solid ${T.border}`}}>
              <div style={{fontSize:9,fontWeight:700,color:T.gray,textTransform:'uppercase',
                letterSpacing:'.3px',marginBottom:4,lineHeight:1.3}}>{lbl}</div>
              <div style={{fontSize:20,fontWeight:800,color:cor,lineHeight:1}}>{val}</div>
              <div style={{fontSize:9,color:T.gray,marginTop:2}}>{unit}</div>
            </div>)}
          </div>

          {/* linha silagem em toneladas como nota */}
          {!ig.sacosKg&&<div style={{marginTop:8,fontSize:11,color:T.gray,textAlign:'center'}}>
            📦 Equivale a {ig.tTotal.toLocaleString('pt-BR',{maximumFractionDigits:1})} toneladas de silagem no período
          </div>}
        </div>)}

        {/* Tabela resumo compacta */}
        <div style={{background:'linear-gradient(135deg,#1e2d3d,#2C3E50)',borderRadius:16,padding:14,marginBottom:8}}>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:10,fontWeight:700,
            textTransform:'uppercase',letterSpacing:'.6px',marginBottom:10}}>🛒 Lista de compras estimada</div>
          {ingCalc.map(ig=><div key={ig.id} style={{display:'flex',justifyContent:'space-between',
            alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:8,height:8,borderRadius:2,background:ig.cor}}/>
              <span style={{color:'rgba(255,255,255,0.8)',fontSize:12}}>{ig.nome}</span>
            </div>
            <span style={{color:'#FFD166',fontSize:13,fontWeight:700}}>
              {ig.sacos
                ? `${ig.sacos} sacos`
                : `${ig.tTotal.toLocaleString('pt-BR',{maximumFractionDigits:1})} t`}
              <span style={{color:'rgba(255,255,255,0.45)',fontWeight:400,fontSize:11}}> · {fmtKg(ig.kgTotal)}</span>
            </span>
          </div>)}
        </div>
      </>}
    </>}

    {!ok&&<div style={{background:T.card,borderRadius:14,padding:20,textAlign:'center',
      border:`1.5px solid ${T.border}`,marginTop:4}}>
      <div style={{fontSize:36,marginBottom:10}}>🐄</div>
      <div style={{fontSize:13,color:T.gray}}>Preencha os dados do lote para ver as projeções de consumo e quantidade de alimentos.</div>
    </div>}
  </div>;
}




function ToolScreen({title,icon,color,onBack,children}){
  const T=useT();
  return <div className="fi" style={{
    position:'fixed',inset:0,background:T.bg,
    zIndex:400,overflowY:'auto',paddingBottom:48
  }}>
    <div style={{background:color,padding:'16px 20px 36px',position:'relative'}}>
      <button onClick={onBack} style={{
        background:'rgba(255,255,255,0.18)',border:'none',color:'#FFF',
        borderRadius:24,padding:'9px 18px 9px 14px',
        fontWeight:600,cursor:'pointer',fontSize:15,marginBottom:18,
        display:'flex',alignItems:'center',gap:4,
        backdropFilter:'blur(4px)'
      }}>
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" style={{marginRight:2}}>
          <path d="M8 1L1.5 7.5L8 14" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        Voltar
      </button>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{
          width:50,height:50,borderRadius:15,
          background:'rgba(255,255,255,0.18)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:26
        }}>{icon}</div>
        <div style={{color:'#FFF',fontSize:21,fontWeight:700,letterSpacing:'-0.4px',lineHeight:1.2}}>{title}</div>
      </div>
    </div>
    <div style={{padding:'20px 16px 0'}}>{children}</div>
  </div>;
}

// ═══ FERRAMENTAS ══════════════════════════════════════════════════
function Ferramentas({adubacoes,setAdubacoes,pastos}){
  const T=useT(),[open,setOpen]=useState(null);

  // ── Estado de cada calculadora ────────────────────────────────
  const [nBois,setNBois]=useState('');const [pMedio,setPMedio]=useState('');
  const ua=nBois&&pMedio?(+nBois*(+pMedio/450)).toFixed(2):null;

  const [haLot,setHaLot]=useState('');const [taxaLot,setTaxaLot]=useState('1.0');
  const lotMax=haLot&&taxaLot?(+haLot * +taxaLot).toFixed(1):null;

  const [nAnimSal,setNAnimSal]=useState('');const [txSal,setTxSal]=useState('225');const [diasSalC,setDiasSalC]=useState('30');
  const kgSal=nAnimSal&&txSal&&diasSalC?((+nAnimSal * +txSal * +diasSalC)/1000).toFixed(1):null;
  const sacosNec=kgSal?Math.ceil(+kgSal/30):null;

  const [pIni,setPIni]=useState('');const [pFim,setPFim]=useState('');const [diasGmd,setDiasGmd]=useState('');
  const gmd=pIni&&pFim&&diasGmd&&+diasGmd>0?((+pFim - +pIni)/+diasGmd).toFixed(3):null;

  const back=()=>setOpen(null);

  // ── Telas individuais ─────────────────────────────────────────
  if(open==='uab') return <ToolScreen title="Unidade Animal (UA)" icon="⚖️" color={`linear-gradient(135deg,${T.gDark},${T.green})`} onBack={back}>
    <div style={{background:T.gPale,borderRadius:14,padding:14,marginBottom:18,border:`1.5px solid ${T.gLight}30`}}>
      <div style={{fontWeight:800,color:T.gDark,fontSize:13,marginBottom:4}}>⚖️ Cálculo de Unidade Animal</div>
      <div style={{fontSize:13,color:T.gray,lineHeight:1.6}}>1 UA = animal de <b>450 kg</b>. Use para dimensionar a pressão de pastejo no pasto.</div>
    </div>
    <Inp label="Número de animais" value={nBois} onChange={setNBois} type="number" placeholder="Ex: 40"/>
    <Inp label="Peso médio (kg)" value={pMedio} onChange={setPMedio} type="number" placeholder="Ex: 380"/>
    {ua&&<div style={{background:T.green,borderRadius:16,padding:24,textAlign:'center',marginTop:8}}>
      <div style={{color:'rgba(255,255,255,0.75)',fontSize:13,fontWeight:700,marginBottom:4}}>TOTAL EM UA</div>
      <div style={{color:'#FFF',fontSize:56,fontWeight:800,lineHeight:1}}>{ua}</div>
      <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,marginTop:8}}>{nBois} animais × {pMedio} kg ÷ 450</div>
    </div>}
  </ToolScreen>;

  if(open==='lot') return <ToolScreen title="Capacidade de Lotação" icon="🌿" color={`linear-gradient(135deg,${T.gDark},${T.green})`} onBack={back}>
    <div style={{background:T.gPale,borderRadius:14,padding:14,marginBottom:18,border:`1.5px solid ${T.gLight}30`}}>
      <div style={{fontWeight:800,color:T.gDark,fontSize:13,marginBottom:4}}>🌿 Lotação do Pasto</div>
      <div style={{fontSize:13,color:T.gray,lineHeight:1.6}}>Calcula quantas UA o pasto suporta com base na área e na taxa de lotação desejada.</div>
    </div>
    <Inp label="Área do pasto (ha)" value={haLot} onChange={setHaLot} type="number" placeholder="Ex: 50"/>
    <div style={{marginBottom:16}}>
      <label style={{display:'block',fontSize:11,fontWeight:700,color:T.gray,marginBottom:9,textTransform:'uppercase',letterSpacing:'.5px'}}>Taxa de lotação (UA/ha)</label>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        {[['0.5','Extensivo','0,5 UA/ha'],['1.0','Médio','1,0 UA/ha'],['1.5','Intensivo','1,5 UA/ha'],['2.5','Super-int.','2,5 UA/ha']].map(([v,l,sub])=><button key={v} onClick={()=>setTaxaLot(v)} style={{border:`2px solid ${taxaLot===v?T.green:T.border}`,borderRadius:12,padding:'12px 8px',cursor:'pointer',background:taxaLot===v?T.gPale:T.card,textAlign:'center'}}>
          <div style={{fontSize:13,fontWeight:800,color:taxaLot===v?T.green:T.text}}>{l}</div>
          <div style={{fontSize:11,color:T.gray,marginTop:2}}>{sub}</div>
        </button>)}
      </div>
      <Inp label="Ou digite manualmente" value={taxaLot} onChange={setTaxaLot} type="number" placeholder="UA/ha"/>
    </div>
    {lotMax&&<div style={{background:T.green,borderRadius:16,padding:24,textAlign:'center',marginTop:8}}>
      <div style={{color:'rgba(255,255,255,0.75)',fontSize:13,fontWeight:700,marginBottom:4}}>CAPACIDADE MÁXIMA</div>
      <div style={{color:'#FFF',fontSize:56,fontWeight:800,lineHeight:1}}>{lotMax} <span style={{fontSize:22}}>UA</span></div>
      <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,marginTop:8}}>{haLot} ha × {taxaLot} UA/ha</div>
    </div>}
  </ToolScreen>;

  if(open==='sal') return <ToolScreen title="Necessidade de Sal Mineral" icon="🧂" color="linear-gradient(135deg,#7B3F00,#E65100)" onBack={back}>
    <div style={{background:'#FFF3E0',borderRadius:14,padding:14,marginBottom:18,border:'1.5px solid #F4A26140'}}>
      <div style={{fontWeight:800,color:'#E65100',fontSize:13,marginBottom:4}}>🧂 Cálculo de Sal Mineral</div>
      <div style={{fontSize:13,color:T.gray,lineHeight:1.6}}>Calcula quantos kg e sacos de 30 kg você precisa comprar para suprir o rebanho por um período.</div>
    </div>
    <Inp label="Número de animais" value={nAnimSal} onChange={setNAnimSal} type="number" placeholder="Ex: 60"/>
    <Inp label="Taxa de sal (g/animal/dia)" value={txSal} onChange={setTxSal} type="number" placeholder="225"/>
    <Inp label="Período (dias)" value={diasSalC} onChange={setDiasSalC} type="number" placeholder="30"/>
    {kgSal&&<div style={{background:'linear-gradient(135deg,#E65100,#F4A261)',borderRadius:16,padding:24,textAlign:'center',marginTop:8}}>
      <div style={{color:'rgba(255,255,255,0.8)',fontSize:13,fontWeight:700,marginBottom:4}}>VOCÊ VAI PRECISAR DE</div>
      <div style={{color:'#FFF',fontSize:56,fontWeight:800,lineHeight:1}}>{kgSal} <span style={{fontSize:22}}>kg</span></div>
      <div style={{color:'rgba(255,255,255,0.9)',fontSize:18,fontWeight:800,marginTop:10}}>{sacosNec} saco{sacosNec!==1?'s':''} de 30 kg</div>
      <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,marginTop:6}}>{nAnimSal} animais × {txSal}g × {diasSalC} dias</div>
    </div>}
  </ToolScreen>;

  if(open==='gmd') return <ToolScreen title="Ganho Médio Diário (GMD)" icon="📈" color={`linear-gradient(135deg,${T.blue},${T.bLight})`} onBack={back}>
    <div style={{background:T.bluePale,borderRadius:14,padding:14,marginBottom:18,border:`1.5px solid ${T.blueMid}30`}}>
      <div style={{fontWeight:800,color:T.blue,fontSize:13,marginBottom:4}}>📈 Ganho Médio Diário</div>
      <div style={{fontSize:13,color:T.gray,lineHeight:1.6}}>Mede o desempenho de crescimento do animal ou lote. Meta Nelore: <b>0,700 – 0,900 kg/dia</b>.</div>
    </div>
    <Inp label="Peso inicial (kg)" value={pIni} onChange={setPIni} type="number" placeholder="Ex: 280"/>
    <Inp label="Peso final (kg)" value={pFim} onChange={setPFim} type="number" placeholder="Ex: 350"/>
    <Inp label="Intervalo (dias)" value={diasGmd} onChange={setDiasGmd} type="number" placeholder="Ex: 90"/>
    {gmd&&<div style={{background:+gmd>=0.7?T.green:+gmd>=0.4?T.orange:T.red,borderRadius:16,padding:24,textAlign:'center',marginTop:8}}>
      <div style={{color:'rgba(255,255,255,0.75)',fontSize:13,fontWeight:700,marginBottom:4}}>GANHO MÉDIO DIÁRIO</div>
      <div style={{color:'#FFF',fontSize:56,fontWeight:800,lineHeight:1}}>{gmd} <span style={{fontSize:22}}>kg/dia</span></div>
      <div style={{color:'rgba(255,255,255,0.9)',fontSize:15,marginTop:10,fontWeight:700}}>
        {+gmd>=0.7?'✅ Excelente desempenho':+gmd>=0.4?'⚠️ Desempenho médio':'🚨 Abaixo do esperado'}
      </div>
      <div style={{color:'rgba(255,255,255,0.7)',fontSize:13,marginTop:6}}>Ganho total: {(+pFim - +pIni).toFixed(1)} kg em {diasGmd} dias</div>
    </div>}
  </ToolScreen>;

  if(open==='adub') return <ToolScreen title="Adubação e Correção" icon="🌱" color={`linear-gradient(135deg,#1a3a1a,#2D6A4F)`} onBack={back}>
    <Adubacao adubacoes={adubacoes} setAdubacoes={setAdubacoes} pastos={pastos}/>
  </ToolScreen>;

  if(open==='conf') return <ToolScreen title="Calculadora de Confinamento" icon="🐄" color="linear-gradient(135deg,#2C3E50,#4a6741)" onBack={back}>
    <Confinamento/>
  </ToolScreen>;

  // ── Menu principal ─────────────────────────────────────────────
  const MENU=[
    {id:'uab',  icon:'⚖️', label:'Unidade Animal',            sub:'Calcule UA do rebanho',            bg:T.gPale,      border:T.gLight,  ic:T.green},
    {id:'lot',  icon:'🌿', label:'Lotação do Pasto',          sub:'Capacidade em UA/ha',              bg:T.gPale,      border:T.gLight,  ic:T.green},
    {id:'sal',  icon:'🧂', label:'Sal Mineral',               sub:'Kg e sacos por período',           bg:'rgba(255,159,10,0.08)', border:T.orange, ic:T.orange},
    {id:'gmd',  icon:'📈', label:'Ganho Médio Diário',        sub:'Desempenho do lote',               bg:T.bluePale,   border:T.blueMid, ic:T.blue},
    {id:'adub', icon:'🌱', label:'Adubação e Correção',       sub:`${adubacoes.length} análise${adubacoes.length!==1?'s':''} salva${adubacoes.length!==1?'s':''}`, bg:T.gPale, border:T.gLight, ic:T.green},
    {id:'conf', icon:'🐄', label:'Confinamento',              sub:'Dieta, estoque e projeção',        bg:T.bluePale,   border:T.blueMid, ic:'#2C3E50'},
  ];

  return <div style={{paddingBottom:100}}>
    <PgH sub="Utilidades" title="Ferramentas 🧮"/>
    <div style={{padding:'16px 14px 0'}}>
      <div style={{fontSize:13,fontWeight:500,color:T.gray,letterSpacing:'-0.1px',marginBottom:14}}>Selecione uma ferramenta</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {MENU.map(m=><button key={m.id} onClick={()=>setOpen(m.id)} style={{
          background:T.card,
          border:`1px solid ${T.border}`,
          borderRadius:20,padding:'16px 18px',cursor:'pointer',
          display:'flex',alignItems:'center',gap:15,textAlign:'left',width:'100%',
          boxShadow:`0 2px 8px ${T.shadow}`
        }}>
          <div style={{
            width:52,height:52,borderRadius:16,
            background:m.bg,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:26,flexShrink:0
          }}>{m.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:600,color:T.text,letterSpacing:'-0.2px',lineHeight:1.3}}>{m.label}</div>
            <div style={{fontSize:13,color:T.gray,marginTop:3}}>{m.sub}</div>
          </div>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none" style={{color:T.gray,flexShrink:0}}>
            <path d="M1 1l6 6-6 6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>)}
      </div>
    </div>
  </div>;
}

// ═══ APP ══════════════════════════════════════════════════════════
function App(){
  const [dark,setDark]=useState(false);
  const T=dark?DARK:LIGHT;
  useEffect(()=>{document.body.style.background=T.bg;},[T.bg]);
  const [page,setPage]=useState('home'),[globalAction,setGA]=useState(null);
  const [loading,setLoading]=useState(true);
  const [pastos,setP]=useState([]);
  const [animais,setA]=useState([]);
  const [fin,setF]=useState([]);
  const [movs,setMv]=useState([]);
  const [sal,setSl]=useState([]);
  const [manejos,setMj]=useState([]);
  const [adubacoes,setAdu]=useState([]);
  // mk: envolve setState para chamar a função nomeada de save automaticamente
  const SAVERS = { pastos: savePastos, animais: saveAnimais, fin: saveFin, movs: saveMovs, sal: saveSal, manejos: saveManejos, adubacoes: saveAdubacoes };
  const mk=(k,s)=>fn=>s(prev=>{const n=typeof fn==='function'?fn(prev):fn;SAVERS[k]?.(n);return n;});
  const setPastos=mk('pastos',setP),setAnimais=mk('animais',setA),setFin=mk('fin',setF),setMovs=mk('movs',setMv),setSal=mk('sal',setSl),setManejos=mk('manejos',setMj),setAdubacoes=mk('adubacoes',setAdu);
  const handleReset=()=>{setP([]);setA([]);setF([]);setMv([]);setSl([]);setMj([]);setAdu([]);dbReset();setPage('home');};
  useEffect(()=>{
    (async()=>{
      try{
        // 1. Carrega configuração (dark mode)
        const cfg = await loadCfg();
        if(cfg?.dark !== undefined) setDark(cfg.dark);

        // 2. Carrega cada entidade com sua função nomeada
        const loaders = [
          [loadPastos,  setP,  'pastos'],
          [loadAnimais, setA,  'animais'],
          [loadFin,     setF,  'fin'],
          [loadMovs,    setMv, 'movs'],
          [loadSal,     setSl, 'sal'],
          [loadManejos, setMj, 'manejos'],
          [loadAdubacoes, setAdu, 'adubacoes'],
        ];
        for(const [loader, setter, name] of loaders){
          const v = await loader();
          if(v !== null){
            setter(v);
            console.log(`✅ ${name}: ${Array.isArray(v)?v.length+' registros':'OK'}`);
          } else {
            console.warn(`⚠️ ${name}: vazio ou não encontrado no banco`);
          }
        }
        console.log('🌿 Sincronização completa');
      }catch(e){
        console.error('❌ Erro crítico ao carregar do Supabase:', e);
      }finally{
        setLoading(false);
      }
    })();
  },[]);
  const bezNovos=animais.filter(a=>a.status==='ativo'&&a.cat==='Bezerro'&&a.dataNasc&&calcIdade(a.dataNasc)?.dias<7).length;
  const nav=[{id:'home',icon:'🏠',label:'Home'},{id:'pastos',icon:'🌿',label:'Pastos'},{id:'animais',icon:'🐄',label:'Animais'},{id:'financeiro',icon:'💰',label:'Caixa'},{id:'historico',icon:'📋',label:'Manejo'},{id:'ferramentas',icon:'🧮',label:'Ferramentas'}];
  if(loading)return <div style={{
    minHeight:'100vh',
    display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',
    background:`linear-gradient(160deg,${T.gDark} 0%,${T.green} 100%)`,
    gap:20
  }}>
    <div style={{
      width:84,height:84,
      background:'rgba(255,255,255,0.15)',
      borderRadius:24,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:44,
      backdropFilter:'blur(10px)',
      boxShadow:'0 8px 32px rgba(0,0,0,0.2)'
    }}>🌿</div>
    <div>
      <div style={{color:'#FFF',fontSize:26,fontWeight:700,letterSpacing:'-0.5px',textAlign:'center'}}>Fazendinha</div>
      <div style={{color:'rgba(255,255,255,0.55)',fontSize:13,textAlign:'center',marginTop:4,fontWeight:400}}>Sincronizando dados...</div>
    </div>
    <div style={{
      width:36,height:36,
      border:'3px solid rgba(255,255,255,0.2)',
      borderTop:'3px solid rgba(255,255,255,0.85)',
      borderRadius:'50%',
      animation:'spin 0.75s linear infinite'
    }}/>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;
  return <TC.Provider value={T}>
    <div style={{
      fontFamily:"'SF Pro Text','SF Pro Display',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif",
      background:T.bg,minHeight:'100vh',
      maxWidth:500,margin:'0 auto',
      position:'relative',overflowX:'hidden'
    }}>
      {page==='home'       &&<Dashboard pastos={pastos} animais={animais} fin={fin} sal={sal} onAction={a=>a==='settings'?setPage('settings'):a==='ferramentas'?setPage('ferramentas'):setGA(a)}/>}
      {page==='pastos'     &&<Pastos pastos={pastos} setPastos={setPastos} animais={animais} sal={sal} setSal={setSal} manejos={manejos} movs={movs}/>}
      {page==='animais'    &&<Animais animais={animais} setAnimais={setAnimais} pastos={pastos} movs={movs} setMovs={setMovs} manejos={manejos}/>}
      {page==='financeiro' &&<Financeiro fin={fin} setFin={setFin}/>}
      {page==='historico'  &&<HistoricoManejo movs={movs} setMovs={setMovs} manejos={manejos} setManejos={setManejos} animais={animais} fin={fin} setFin={setFin} pastos={pastos}/>}
      {page==='ferramentas'&&<Ferramentas adubacoes={adubacoes} setAdubacoes={setAdubacoes} pastos={pastos}/>}
      {page==='settings'   &&<Settings dark={dark} setDark={v=>{setDark(v);saveCfg({dark:v});}} onReset={handleReset} onClose={()=>setPage('home')} movs={movs} manejos={manejos} animais={animais} fin={fin} pastos={pastos} sal={sal}/>}
      {globalAction&&<GlobalModals action={globalAction} onClose={()=>setGA(null)} pastos={pastos} animais={animais} setAnimais={setAnimais} setSal={setSal} setMovs={setMovs}/>}
      {page!=='settings'&&<div style={{
        position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
        width:'100%',maxWidth:500,
        background:dark?'rgba(28,28,30,0.92)':'rgba(255,255,255,0.92)',
        backdropFilter:'blur(20px)',
        WebkitBackdropFilter:'blur(20px)',
        borderTop:`1px solid ${dark?'rgba(56,56,58,0.6)':'rgba(0,0,0,0.06)'}`,
        display:'flex',zIndex:300,
        paddingBottom:'env(safe-area-inset-bottom,0px)'
      }}>
        {nav.map(n=>{
          const isActive=page===n.id;
          const icons={
            home:['M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z','M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'],
            pastos:null,animais:null,financeiro:null,historico:null,ferramentas:null
          };
          return <button key={n.id} onClick={()=>setPage(n.id)} style={{
            flex:1,border:'none',background:'none',
            padding:'10px 0 12px',cursor:'pointer',
            display:'flex',flexDirection:'column',alignItems:'center',gap:3,
            position:'relative'
          }}>
            {n.id==='animais'&&bezNovos>0&&<div style={{
              position:'absolute',top:6,left:'55%',
              background:T.pink,color:'#FFF',
              borderRadius:20,minWidth:16,height:16,
              fontSize:9,fontWeight:700,
              display:'flex',alignItems:'center',justifyContent:'center',
              padding:'0 4px',
              border:'2px solid '+T.bg
            }}>{bezNovos}</div>}
            <span style={{fontSize:21,lineHeight:1,filter:isActive?'none':'grayscale(40%) opacity(0.6)'}}>{n.icon}</span>
            <span style={{
              fontSize:10,fontWeight:isActive?600:400,
              color:isActive?T.green:T.gray,
              letterSpacing:'-0.1px',lineHeight:1
            }}>{n.label}</span>
            {isActive&&<div style={{
              position:'absolute',bottom:0,left:'30%',right:'30%',
              height:2.5,
              background:T.green,
              borderRadius:'2px 2px 0 0'
            }}/>}
          </button>;
        })}
      </div>}
    </div>
  </TC.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
